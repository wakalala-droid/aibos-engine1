// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
let completed = new Set(JSON.parse(localStorage.getItem('aibos_v2')||'[]'));
let currentSkill = null;
let currentStage = null;
let openErrors = new Set();

function save(){ localStorage.setItem('aibos_v2', JSON.stringify([...completed])); }
function isUnlocked(sk){ return sk.deps.every(d=>completed.has(d)); }
function getTotalXP(){ let x=0; STAGES.forEach(s=>s.skills.forEach(sk=>{ if(completed.has(sk.id)) x+=sk.xp; })); return x; }
function getMaxXP(){ let x=0; STAGES.forEach(s=>s.skills.forEach(sk=>x+=sk.xp)); return x; }
function getLevel(xp){
  if(xp<150) return [1,'Beginner'];
  if(xp<400) return [2,'Learner'];
  if(xp<800) return [3,'Builder'];
  if(xp<1300) return [4,'Developer'];
  if(xp<1900) return [5,'Engineer'];
  if(xp<2500) return [6,'AI Builder'];
  return [7,'Founder'];
}
function updateXP(){
  const xp=getTotalXP(), max=getMaxXP();
  document.getElementById('xpNow').textContent=xp;
  document.getElementById('xpMax').textContent=max;
  document.getElementById('xpFill').style.width=max>0?(xp/max*100)+'%':'0%';
  const [n,l]=getLevel(xp);
  document.getElementById('lvlChip').textContent=`LVL ${n} · ${l}`;
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER STAGE BAR
// ═══════════════════════════════════════════════════════════════════════════
function renderBar(){
  const el=document.getElementById('stageBar');
  el.innerHTML='';
  STAGES.forEach((st,i)=>{
    const done=st.skills.filter(s=>completed.has(s.id)).length;
    const pct=done/st.skills.length*100;
    const d=document.createElement('div');
    d.className='sb-pill';
    d.innerHTML=`<div class="sb-num">Stage ${i+1}</div><div class="sb-name" style="color:${st.color}">${st.name}</div><div class="sb-track"><div class="sb-fill" style="width:${pct}%;background:${st.color}"></div></div>`;
    el.appendChild(d);
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER TREE
// ═══════════════════════════════════════════════════════════════════════════
function renderTree(){
  const main=document.getElementById('treeMain');
  main.innerHTML='';
  STAGES.forEach(st=>{
    const done=st.skills.filter(s=>completed.has(s.id)).length;
    const sec=document.createElement('div');
    sec.className='stage-sec';
    sec.innerHTML=`<div class="stage-hdr"><div class="stage-dot" style="background:${st.color}"></div><div class="stage-lbl" style="color:${st.color}">${st.name}</div><div class="stage-meta">${st.time} &nbsp;·&nbsp; <span style="color:${st.color}">${done}/${st.skills.length}</span> complete</div></div><div class="skill-grid" id="g-${st.id}"></div>`;
    main.appendChild(sec);
    const grid=sec.querySelector(`#g-${st.id}`);
    st.skills.forEach(sk=>{
      const unlocked=isUnlocked(sk)||completed.has(sk.id);
      const done=completed.has(sk.id);
      const isSel=currentSkill&&currentSkill.id===sk.id;
      const node=document.createElement('div');
      node.className=`node${done?' done':''}${!unlocked?' locked':''}${isSel?' sel':''}`;
      node.style.setProperty('--nc',st.color);
      node.innerHTML=`<div class="node-top"><div class="node-ico">${sk.icon}</div><div class="node-check">${done?'✓':''}</div></div><div class="node-name">${sk.name}</div><div class="node-blurb">${sk.blurb}</div><div class="node-footer"><div class="node-xp">+${sk.xp} XP</div><div class="node-time">${sk.time}</div></div>`;
      if(unlocked){ node.addEventListener('click',()=>openSkill(sk,st)); }
      grid.appendChild(node);
    });
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// OPEN LESSON SHEET
// ═══════════════════════════════════════════════════════════════════════════
function openSkill(sk, st){
  currentSkill=sk; currentStage=st;
  renderTree();

  document.getElementById('shIco').textContent=sk.icon;
  document.getElementById('shTitle').textContent=sk.name;
  document.getElementById('shMeta').innerHTML=`
    <span class="chip chip-stage">${st.name}</span>
    <span class="chip chip-time">⏱ ${sk.time}</span>
    <span class="chip chip-xp">+${sk.xp} XP</span>
    ${sk.deps.length>0?`<span class="chip" style="background:rgba(124,58,237,.12);color:#a78bfa">Requires: ${sk.deps.join(', ')}</span>`:''}
  `;

  buildLearnTab(sk, st);
  buildCodeTab(sk);
  buildExerciseTab(sk, st);
  buildErrorsTab(sk, st);

  switchTab('learn', document.querySelector('.tab-btn.active')||document.querySelector('.tab-btn'));
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{ b.classList.remove('active'); if(i===0) b.classList.add('active'); });

  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').scrollTop=0;
}

function closeSheet(){ document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target===document.getElementById('overlay')) closeSheet(); });

function switchTab(id, btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(btn){ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
}

// ═══════════════════════════════════════════════════════════════════════════
// BUILD TABS
// ═══════════════════════════════════════════════════════════════════════════
function buildLearnTab(sk, st){
  document.getElementById('tab-learn').innerHTML=sk.learn||'<p style="color:var(--muted2)">Content coming soon.</p>';
}

function buildCodeTab(sk){
  const el=document.getElementById('tab-code');
  el.innerHTML=sk.codeBreakdown||`<p style="color:var(--muted2)">Code breakdown coming soon.</p>`;
}

function buildExerciseTab(sk, st){
  const el=document.getElementById('tab-exercise');
  const done=completed.has(sk.id);
  const ex=sk.exercise;
  if(!ex){ el.innerHTML='<p style="color:var(--muted2)">Exercise coming soon.</p>'; return; }

  const steps=ex.steps.map((s,i)=>`<div class="ex-step"><div class="ex-step-num">${i+1}</div><p>${s}</p></div>`).join('');

  el.innerHTML=`
    <div class="ex-task">
      <div class="ex-task-label">▶ YOUR MISSION</div>
      <p>${ex.task}</p>
    </div>
    <div class="ex-steps">${steps}</div>
    <div style="margin-top:20px">
      <div class="ex-input-label">${ex.inputLabel||'Paste your output:'}</div>
      <textarea class="ex-textarea" id="exInput" placeholder="${ex.placeholder||''}" rows="4"></textarea>
      <button class="grade-btn" onclick="gradeExercise()">Check My Answer →</button>
      <div class="grade-result" id="gradeResult"><div class="gr-title" id="gradeTitle"></div><div class="gr-body" id="gradeBody"></div></div>
    </div>
    <button class="complete-btn${done?' done':''}" id="completeBtn" onclick="toggleComplete()">
      ${done?'✓ Completed — click to undo':`Mark as Done +${sk.xp} XP`}
    </button>
  `;
}

function buildErrorsTab(sk, st){
  const el=document.getElementById('tab-errors');
  const errors=sk.errors||[];
  let html='';
  if(errors.length===0){ html='<p style="color:var(--muted2);font-size:13px;">No specific errors documented for this skill yet. Use the paste helper below if you encounter an error.</p>'; }
  errors.forEach((e,i)=>{
    html+=`<div class="error-card">
      <div class="ec-header" onclick="toggleErr(${i})">
        <div class="ec-err">${e.err}</div>
        <div class="ec-toggle" id="ec-t-${i}">▼</div>
      </div>
      <div class="ec-body" id="ec-b-${i}">
        <div class="ec-why">${e.why}</div>
        <div class="ec-fix-label">✓ HOW TO FIX IT</div>
        <div class="ec-fix">${e.fix}</div>
      </div>
    </div>`;
  });
  html+=`<div class="error-helper">
    <div class="eh-label">PASTE ANY ERROR FOR INSTANT HELP</div>
    <textarea class="eh-input" id="errInput" placeholder="Paste the error message from your terminal here..."></textarea>
    <button class="eh-btn" onclick="diagError()">Diagnose Error →</button>
    <div class="eh-result" id="errResult"></div>
  </div>`;
  el.innerHTML=html;
}

function toggleErr(i){
  const b=document.getElementById('ec-b-'+i);
  const t=document.getElementById('ec-t-'+i);
  b.classList.toggle('open');
  t.textContent=b.classList.contains('open')?'▲':'▼';
}

// ═══════════════════════════════════════════════════════════════════════════
// GRADING
// ═══════════════════════════════════════════════════════════════════════════
function gradeExercise(){
  if(!currentSkill||!currentSkill.exercise||!currentSkill.exercise.grader) return;
  const val=document.getElementById('exInput').value;
  if(!val.trim()){ document.getElementById('gradeResult').className='grade-result fail'; document.getElementById('gradeResult').style.display='block'; document.getElementById('gradeTitle').textContent='Nothing to check'; document.getElementById('gradeBody').textContent='Paste your output first, then click Check.'; return; }
  const result=currentSkill.exercise.grader(val);
  const el=document.getElementById('gradeResult');
  el.className='grade-result '+(result.pass?'pass':result.partial?'partial':'fail');
  el.style.display='block';
  document.getElementById('gradeTitle').textContent=result.pass?'✓ Correct!':result.partial?'⚡ Almost there':'✗ Not quite';
  document.getElementById('gradeBody').innerHTML=result.msg.replace(/\n/g,'<br>');
}

// ═══════════════════════════════════════════════════════════════════════════
// ERROR DIAGNOSER
// ═══════════════════════════════════════════════════════════════════════════
function diagError(){
  const v=(document.getElementById('errInput').value||'').toLowerCase();
  const el=document.getElementById('errResult');
  el.classList.add('show');
  const rules=[
    {match:'nameerror',msg:'<strong>NameError</strong> means you referenced a variable or function that does not exist yet. Check: (1) Is it defined before you use it? (2) Is the spelling and capitalisation exactly right? (3) Is it inside the right scope (function/loop)?'},
    {match:'syntaxerror',msg:'<strong>SyntaxError</strong> means Python cannot parse your code. Check: (1) Are all brackets/parentheses closed? (2) Is there a colon after every if/for/def/else? (3) Are quotes matching (open and close with same type)?'},
    {match:'indentationerror',msg:'<strong>IndentationError</strong> means your spacing is wrong. Use exactly 4 spaces (or 1 Tab) for each level of indentation. Never mix tabs and spaces. The line number in the error shows where Python got confused.'},
    {match:'keyerror',msg:'<strong>KeyError</strong> means you tried to access a dict key that does not exist. Check df.columns.tolist() or print(dict.keys()) to see the exact available keys. Keys are case-sensitive.'},
    {match:'typeerror',msg:'<strong>TypeError</strong> means you used the wrong type. Common causes: (1) adding a string to a number, (2) calling a function with the wrong number of arguments, (3) using a non-list in a for loop.'},
    {match:'indexerror',msg:'<strong>IndexError</strong> means you tried to access a list position that does not exist. Remember Python lists start at 0. A list with 6 items has valid positions 0–5. Position 6 does not exist.'},
    {match:'filenotfounderror',msg:'<strong>FileNotFoundError</strong> means Python cannot find your CSV or Excel file. Make sure the file is in the same folder as your Python script. Check spelling exactly — filenames are case-sensitive on Mac/Linux.'},
    {match:'modulenotfounderror',msg:'<strong>ModuleNotFoundError</strong> means a library is not installed. Run in terminal: <strong>pip install [library-name]</strong>. Make sure you are using the same Python/terminal as VS Code.'},
    {match:'zerodivision',msg:'<strong>ZeroDivisionError</strong> means you divided by zero. In financial code this usually means a revenue or denominator value is 0. Add a check: if revenue != 0: before the division.'},
    {match:'attributeerror',msg:'<strong>AttributeError</strong> means you called a method that does not exist on that type. For example, calling .sum() on a non-numeric column, or .mean() on a string. Check the data type with print(df.dtypes).'},
    {match:'authenticationerror',msg:'<strong>AuthenticationError</strong> from Anthropic means your API key is wrong or not set. Check: (1) The environment variable is set in the SAME terminal session. (2) The key starts with sk-ant-. (3) The key is not expired in console.anthropic.com.'},
  ];
  const found=rules.find(r=>v.includes(r.match));
  el.innerHTML=found?found.msg:`<strong>Error not in database.</strong> Try: (1) Google the exact error message. (2) Check the line number Python mentions. (3) Add print() statements before the error line to see what values Python has at that point. (4) Share the full error in the AI-BOS learning community.`;
}

// ═══════════════════════════════════════════════════════════════════════════
// COMPLETE TOGGLE
// ═══════════════════════════════════════════════════════════════════════════
function toggleComplete(){
  if(!currentSkill) return;
  const sk=currentSkill, st=currentStage;
  const wasDone=completed.has(sk.id);
  if(wasDone){ completed.delete(sk.id); }
  else { completed.add(sk.id); showToast(`+${sk.xp} XP — ${sk.name}`); }
  save(); renderTree(); renderBar(); updateXP();

  const btn=document.getElementById('completeBtn');
  if(btn){
    const now=completed.has(sk.id);
    btn.className='complete-btn'+(now?' done':'');
    btn.textContent=now?'✓ Completed — click to undo':`Mark as Done +${sk.xp} XP`;
  }

  if(!wasDone){
    const allStageDone=st.skills.every(s=>completed.has(s.id));
    if(allStageDone) setTimeout(()=>showStageModal(st),500);
    const allDone=STAGES.every(s=>s.skills.every(sk=>completed.has(sk.id)));
    if(allDone) setTimeout(()=>showFinalModal(),700);
  }
}
