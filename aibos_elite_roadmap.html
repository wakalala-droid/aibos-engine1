<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-BOS · Engine 1 Mastery Map</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Clash+Display:wght@400;500;600;700&family=Satoshi:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--bg2:#0c1018;--bg3:#111824;--card:#0e1520;
  --line:#1a2438;--line2:#243048;
  --c1:#00d4ff;--c2:#7c3aed;--c3:#f59e0b;--c4:#10b981;--c5:#f43f5e;--c6:#8b5cf6;
  --text:#dde4f0;--muted:#4a5a72;--muted2:#6a7a92;
  --green:#10b981;--red:#ef4444;--gold:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Satoshi',sans-serif;min-height:100vh;overflow-x:hidden;}

/* NOISE TEXTURE */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}

/* ── HEADER ── */
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--line);background:rgba(7,9,15,.9);backdrop-filter:blur(20px);}
.logo{display:flex;align-items:center;gap:14px;}
.logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--c2),var(--c1));display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#fff;letter-spacing:-.5px;}
.logo-name{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.logo-sub{font-size:10px;color:var(--muted2);font-family:'JetBrains Mono',monospace;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:20px;}
.xp-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.xp-row{display:flex;align-items:center;gap:8px;}
.xp-nums{font-size:11px;color:var(--muted2);font-family:'JetBrains Mono',monospace;}
.xp-track{width:160px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c1));border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1);}
.lvl-chip{padding:5px 14px;border-radius:20px;background:linear-gradient(135deg,var(--c2),var(--c1));font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap;}

/* ── STAGE BAR ── */
.stage-bar{position:relative;z-index:10;display:flex;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;}
.stage-bar::-webkit-scrollbar{display:none;}
.sb-pill{flex:1;min-width:120px;padding:10px 12px;cursor:pointer;border-right:1px solid var(--line);transition:background .2s;position:relative;}
.sb-pill:last-child{border-right:none;}
.sb-pill:hover{background:var(--bg2);}
.sb-num{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.06em;}
.sb-name{font-size:11px;font-weight:700;margin-top:2px;}
.sb-track{height:2px;background:var(--bg3);border-radius:1px;margin-top:8px;overflow:hidden;}
.sb-fill{height:100%;border-radius:1px;transition:width .5s;}

/* ── MAIN ── */
.main{position:relative;z-index:5;padding:28px 32px;max-width:1400px;margin:0 auto;}

/* ── STAGE SECTION ── */
.stage-sec{margin-bottom:44px;}
.stage-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--line);}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.stage-lbl{font-size:14px;font-weight:700;}
.stage-meta{font-size:10px;color:var(--muted2);font-family:'JetBrains Mono',monospace;margin-left:auto;}
.stage-progress-text{font-size:10px;font-family:'JetBrains Mono',monospace;}

/* ── SKILL GRID ── */
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}

/* ── NODE ── */
.node{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:16px 16px 14px;cursor:pointer;position:relative;overflow:hidden;transition:all .18s ease;user-select:none;}
.node::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--nc) 0%,transparent 60%);opacity:0;transition:opacity .2s;}
.node:hover:not(.locked){border-color:var(--nc);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.5);}
.node:hover:not(.locked)::before{opacity:.06;}
.node.done{border-color:var(--green);background:rgba(16,185,129,.07);}
.node.locked{opacity:.38;cursor:not-allowed;filter:grayscale(.4);}
.node.sel{border-color:var(--nc);box-shadow:0 0 0 3px rgba(0,212,255,.12);}
.node-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.node-ico{font-size:20px;line-height:1;}
.node-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--muted);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all .2s;}
.node.done .node-check{background:var(--green);border-color:var(--green);color:#fff;}
.node-name{font-size:12px;font-weight:700;margin-bottom:4px;line-height:1.3;}
.node-blurb{font-size:10px;color:var(--muted2);line-height:1.5;}
.node-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.node-xp{font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(0,212,255,.1);color:var(--c1);}
.node.done .node-xp{background:rgba(16,185,129,.15);color:var(--green);}
.node-time{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(6px);}
.overlay.open{opacity:1;pointer-events:all;}
.lesson-sheet{position:relative;background:var(--bg2);border-top:1px solid var(--line2);border-radius:24px 24px 0 0;width:100%;max-height:92vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);}
.overlay.open .lesson-sheet{transform:translateY(0);}

/* Sheet handle */
.sheet-handle{width:40px;height:4px;background:var(--line2);border-radius:2px;margin:12px auto 0;}

/* Sheet header */
.sheet-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 32px 0;flex-shrink:0;}
.sh-left{display:flex;align-items:center;gap:14px;}
.sh-ico{font-size:32px;line-height:1;}
.sh-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:3px;}
.sh-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.chip{padding:4px 10px;border-radius:20px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;}
.chip-stage{background:rgba(255,255,255,.06);color:var(--muted2);}
.chip-time{background:rgba(245,158,11,.12);color:var(--gold);}
.chip-xp{background:rgba(0,212,255,.1);color:var(--c1);}
.close-btn{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--line2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted2);transition:all .15s;flex-shrink:0;}
.close-btn:hover{background:var(--line2);color:var(--text);}

/* Sheet tabs */
.sheet-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-top:16px;padding:0 32px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.sheet-tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:10px 18px;font-size:12px;font-weight:700;color:var(--muted2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Satoshi',sans-serif;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--c1);border-bottom-color:var(--c1);}

/* Sheet body */
.sheet-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:28px 32px 40px;scrollbar-width:thin;scrollbar-color:var(--line2) transparent;}
.sheet-body::-webkit-scrollbar{width:4px;}
.sheet-body::-webkit-scrollbar-track{background:transparent;}
.sheet-body::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px;}

/* Tab panes */
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* ── LESSON TAB ── */
.lesson-section{margin-bottom:28px;}
.ls-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted2);text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.ls-body{font-size:14px;line-height:1.8;color:#a8b8cc;}
.ls-body strong{color:var(--text);font-weight:700;}
.ls-body em{color:var(--c1);font-style:normal;}

/* Analogy box */
.analogy-box{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.25);border-radius:12px;padding:16px 20px;margin:12px 0;}
.analogy-box .ab-label{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--c2);font-family:'JetBrains Mono',monospace;margin-bottom:6px;}
.analogy-box p{font-size:13px;color:#a8b8cc;line-height:1.7;}

/* Warning box */
.warn-box{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:14px 18px;margin:10px 0;}
.warn-box .wb-label{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--red);font-family:'JetBrains Mono',monospace;margin-bottom:6px;}
.warn-box p{font-size:12px;color:#c8a8a8;line-height:1.6;}

/* Tip box */
.tip-box{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:14px 18px;margin:10px 0;}
.tip-box .tb-label{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--green);font-family:'JetBrains Mono',monospace;margin-bottom:6px;}
.tip-box p{font-size:12px;color:#a8c8b8;line-height:1.6;}

/* ── CODE BREAKDOWN TAB ── */
.code-full{background:#060c18;border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:20px;overflow-x:auto;}
.code-full pre{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9;white-space:pre;}
.kw{color:#c084fc;}.fn{color:#38bdf8;}.st{color:#4ade80;}.cm{color:#374151;}.nm{color:#fbbf24;}.op{color:#fb923c;}

.line-breakdown{display:flex;flex-direction:column;gap:12px;}
.lb-item{display:flex;gap:14px;align-items:flex-start;}
.lb-code{background:#060c18;border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#94a3b8;flex-shrink:0;min-width:200px;max-width:260px;word-break:break-all;}
.lb-arrow{color:var(--muted);flex-shrink:0;margin-top:8px;}
.lb-explain{font-size:12px;line-height:1.7;color:#94a3b8;padding-top:4px;}
.lb-explain strong{color:var(--text);}

/* ── EXERCISE TAB ── */
.exercise-header{margin-bottom:20px;}
.ex-task{background:var(--bg3);border:1px solid var(--line2);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.ex-task-label{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--c3);font-family:'JetBrains Mono',monospace;margin-bottom:8px;}
.ex-task p{font-size:13px;line-height:1.7;color:#a8b8cc;}
.ex-task p strong{color:var(--text);}

.ex-steps{display:flex;flex-direction:column;gap:8px;margin:12px 0;}
.ex-step{display:flex;gap:10px;align-items:flex-start;}
.ex-step-num{width:20px;height:20px;border-radius:50%;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--c1);font-family:'JetBrains Mono',monospace;flex-shrink:0;margin-top:1px;}
.ex-step p{font-size:12px;color:#94a3b8;line-height:1.6;}

.ex-input-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted2);font-family:'JetBrains Mono',monospace;margin-bottom:8px;}
.ex-textarea{width:100%;background:#060c18;border:1.5px solid var(--line2);border-radius:10px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);resize:vertical;min-height:90px;outline:none;transition:border-color .2s;}
.ex-textarea:focus{border-color:var(--c1);}

.grade-btn{padding:12px 28px;border-radius:10px;border:none;cursor:pointer;font-family:'Satoshi',sans-serif;font-size:13px;font-weight:700;background:linear-gradient(135deg,var(--c2),var(--c1));color:#fff;transition:all .2s;margin-top:10px;}
.grade-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,212,255,.2);}
.grade-btn:active{transform:translateY(0);}

.grade-result{margin-top:14px;padding:16px 18px;border-radius:12px;display:none;}
.grade-result.pass{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);display:block;}
.grade-result.fail{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);display:block;}
.grade-result.partial{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);display:block;}
.gr-title{font-size:12px;font-weight:700;margin-bottom:6px;}
.grade-result.pass .gr-title{color:var(--green);}
.grade-result.fail .gr-title{color:var(--red);}
.grade-result.partial .gr-title{color:var(--gold);}
.gr-body{font-size:12px;line-height:1.7;color:#a8b8cc;}

.complete-btn{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;font-family:'Satoshi',sans-serif;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--c2),var(--c1));color:#fff;transition:all .2s;margin-top:16px;}
.complete-btn:hover:not(.done){transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,212,255,.25);}
.complete-btn.done{background:rgba(16,185,129,.15);color:var(--green);border:1.5px solid var(--green);}

/* ── ERRORS TAB ── */
.error-card{background:var(--bg3);border:1px solid var(--line2);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.ec-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .15s;}
.ec-header:hover{background:rgba(255,255,255,.03);}
.ec-err{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--red);font-weight:700;}
.ec-toggle{margin-left:auto;font-size:12px;color:var(--muted);transition:transform .2s;}
.ec-body{padding:0 16px;max-height:0;overflow:hidden;transition:all .3s;}
.ec-body.open{max-height:400px;padding:12px 16px 16px;}
.ec-why{font-size:12px;color:#94a3b8;line-height:1.7;margin-bottom:10px;}
.ec-fix-label{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--green);font-family:'JetBrains Mono',monospace;margin-bottom:6px;}
.ec-fix{background:#060c18;border-radius:8px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#94a3b8;line-height:1.7;}

/* Paste error help */
.error-helper{background:var(--bg3);border:1px solid var(--line2);border-radius:12px;padding:20px;margin-top:20px;}
.eh-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted2);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
.eh-input{width:100%;background:#060c18;border:1.5px solid var(--line2);border-radius:8px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);resize:vertical;min-height:80px;outline:none;transition:border-color .2s;}
.eh-input:focus{border-color:var(--c5);}
.eh-btn{padding:9px 20px;border-radius:8px;border:1px solid var(--c5);cursor:pointer;background:rgba(244,63,94,.1);color:var(--c5);font-family:'Satoshi',sans-serif;font-size:12px;font-weight:700;margin-top:8px;transition:all .15s;}
.eh-btn:hover{background:rgba(244,63,94,.2);}
.eh-result{margin-top:12px;font-size:12px;color:#a8b8cc;line-height:1.7;display:none;}
.eh-result.show{display:block;}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;right:28px;z-index:999;background:var(--bg3);border:1px solid var(--green);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;color:var(--green);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);font-family:'JetBrains Mono',monospace;}
.toast.show{transform:translateY(0);opacity:1;}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;padding:20px;}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal-box{background:var(--bg2);border:1px solid var(--c1);border-radius:20px;padding:40px;max-width:400px;width:100%;text-align:center;box-shadow:0 0 80px rgba(0,212,255,.15);}
.modal-emoji{font-size:52px;margin-bottom:14px;}
.modal-title{font-size:22px;font-weight:700;margin-bottom:8px;}
.modal-sub{font-size:13px;color:var(--muted2);line-height:1.6;margin-bottom:24px;}
.modal-close{padding:11px 32px;background:linear-gradient(135deg,var(--c2),var(--c1));border:none;border-radius:10px;color:#fff;font-family:'Satoshi',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

/* RESPONSIVE */
@media(max-width:600px){
  .main{padding:20px 16px;}
  .sheet-hdr,.sheet-tabs,.sheet-body{padding-left:18px;padding-right:18px;}
  .skill-grid{grid-template-columns:1fr 1fr;}
  header{padding:14px 18px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">AI</div>
    <div>
      <div class="logo-name">AI-BOS Mastery Map</div>
      <div class="logo-sub">Engine 1 · Financial Intelligence · Complete Beginner Path</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="xp-wrap">
      <div class="xp-row">
        <div class="xp-nums"><span id="xpNow">0</span>/<span id="xpMax">0</span> XP</div>
        <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="lvl-chip" id="lvlChip">LVL 0</div>
  </div>
</header>

<div class="stage-bar" id="stageBar"></div>
<div class="main" id="treeMain"></div>

<!-- LESSON OVERLAY -->
<div class="overlay" id="overlay">
  <div class="lesson-sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <div class="sh-left">
        <div class="sh-ico" id="shIco"></div>
        <div>
          <div class="sh-title" id="shTitle"></div>
          <div class="sh-meta" id="shMeta"></div>
        </div>
      </div>
      <button class="close-btn" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-tabs" id="sheetTabs">
      <button class="tab-btn active" onclick="switchTab('learn',this)">📖 Understand</button>
      <button class="tab-btn" onclick="switchTab('code',this)">⚙️ Code Breakdown</button>
      <button class="tab-btn" onclick="switchTab('exercise',this)">🎯 Exercise</button>
      <button class="tab-btn" onclick="switchTab('errors',this)">🚨 Errors & Help</button>
    </div>
    <div class="sheet-body" id="sheetBody">
      <div class="tab-pane active" id="tab-learn"></div>
      <div class="tab-pane" id="tab-code"></div>
      <div class="tab-pane" id="tab-exercise"></div>
      <div class="tab-pane" id="tab-errors"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-bg" id="modal"><div class="modal-box" id="modalBox"></div></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// SKILL DATA — ELITE LEVEL
// ═══════════════════════════════════════════════════════════════════════════
const STAGES = [
{
  id:'s1',name:'Python Core',color:'#00d4ff',time:'Days 1–3',
  skills:[
  {
    id:'setup',name:'Install Python & VS Code',icon:'⚙️',xp:50,time:'20 min',deps:[],
    blurb:'Get your coding environment running.',
    learn:`
<div class="lesson-section">
  <div class="ls-label">What you are doing and why</div>
  <div class="ls-body">
    Python is the language. VS Code is the text editor where you write that language. Think of it this way: <strong>Python is English, VS Code is Microsoft Word.</strong> You need both. Without Python installed, your computer literally does not understand the code you write. Without VS Code, writing code is painful.
    <br><br>
    You are not installing a game or an app. You are installing a <strong>translator</strong> — one that takes your instructions and tells the computer exactly what to do.
  </div>
</div>
<div class="lesson-section">
  <div class="ls-label">Exact steps</div>
  <div class="ls-body">

    learn:`
<div class="lesson-section">
  <div class="ls-label">What a variable actually is</div>
  <div class="ls-body">
    A variable is a <strong>named storage box</strong>. You give it a name, you put a value in it, and you can use that name anywhere later to get the value back. That is the complete concept.
    <br><br>
    In the Financial Intelligence Engine, <strong>every single piece of data</strong> — every revenue figure, every cost, every calculated profit — lives inside a variable. You cannot build the engine without understanding this.
  </div>
</div>
<div class="analogy-box">
  <div class="ab-label">💡 ANALOGY</div>
  <p>Think of a variable like a labelled envelope. You write "monthly_revenue" on the outside. You put 45000 inside. Whenever you need that number, you just say its name — "monthly_revenue" — and Python hands you the envelope and tells you what is inside.</p>
</div>
<div class="lesson-section">
  <div class="ls-label">The = sign means "store", not "equals"</div>
  <div class="ls-body">
    This trips up beginners every time. In maths, <strong>= means both sides are equal</strong>. In Python, <strong>= means "take what is on the right and store it in the name on the left."</strong>
    <br><br>
    So <em>profit = revenue - costs</em> means: calculate revenue minus costs, then store the result in a box called "profit". It is an instruction, not a statement of equality.
  </div>
</div>
<div class="warn-box">
  <div class="wb-label">⚠ COMMON MISTAKE</div>
  <p>Variable names cannot have spaces. <strong>monthly revenue = 45000</strong> crashes. Use underscores instead: <strong>monthly_revenue = 45000</strong>. Also: variable names are case-sensitive. <strong>Revenue</strong> and <strong>revenue</strong> are two different boxes.</p>
</div>`,

<span class="nm">profit</span> = <span class="nm">monthly_revenue</span> - <span class="nm">monthly_costs</span>
<span class="fn">print</span>(<span class="st">"Monthly profit:"</span>, <span class="nm">profit</span>)</pre></div>

    blurb:'Display results in plain English, not just numbers.',
    learn:`
<div class="lesson-section">
  <div class="ls-label">What a string is</div>
  <div class="ls-body">
    A <strong>string</strong> is any text in Python. The word "string" comes from "string of characters." Every time you wrap something in quotes, you have a string: <em>"hello"</em>, <em>"K45,000"</em>, <em>"Monthly Report"</em>.
    <br><br>
    In AI-BOS, <strong>every insight, every alert, every report header is a string</strong>. When the AI CFO says "Your profit margin dropped 8% this month" — that is a string. Understanding strings means you can control exactly what the system says to a business owner.
  </div>
</div>
<div class="lesson-section">
  <div class="ls-label">f-strings — embedding variables in text</div>
  <div class="ls-body">
    An f-string is a string that can <strong>pull variable values into itself automatically</strong>. You put an f before the opening quote, and use curly braces {} to mark where you want a variable's value inserted.
    <br><br>
    This is how AI-BOS generates personalised messages: <em>f"Your profit this month is K{profit:,}"</em> → <em>"Your profit this month is K17,000"</em>. The :, inside the curly braces adds thousands separators to numbers automatically.
  </div>
</div>
<div class="tip-box">
  <div class="tb-label">✓ THE :, FORMAT TRICK</div>
  <p>When printing large numbers, add <strong>:,</strong> inside the curly braces: <strong>f"Revenue: K{revenue:,}"</strong>. This formats 45000 as 45,000 — much more readable in a financial report. For decimals: <strong>{margin:.1f}</strong> shows one decimal place.</p>
</div>`,

<span class="fn">print</span>(<span class="st">f"Profit: K</span><span class="nm">{profit:,}</span><span class="st">"</span>)
<span class="fn">print</span>(<span class="st">f"Margin: </span><span class="nm">{margin:.1f}</span><span class="st">%"</span>)</pre></div>

    blurb:'Store 12 months of data in one named collection.',
    learn:`
<div class="lesson-section">
  <div class="ls-label">Why lists exist</div>
  <div class="ls-body">
    What if you need to store 12 months of revenue? Without lists, you would write 12 separate variables: <em>jan_revenue, feb_revenue, mar_revenue...</em> That is 12 lines just to store data, and impossible to loop through automatically.
    <br><br>
    A <strong>list</strong> holds multiple values in one named variable, in order. <em>revenues = [42000, 45000, 38000...]</em> — one variable, all 12 values, ready to calculate against. <strong>When a business uploads their annual spreadsheet, it arrives as a list of rows.</strong>
  </div>
</div>
<div class="lesson-section">
  <div class="ls-label">Indexing — how to get one item from a list</div>
  <div class="ls-body">
    Lists are ordered and numbered starting from <strong>0, not 1</strong>. This surprises everyone. The first item is at position 0, the second at position 1, and so on.
    <br><br>
    <em>revenues[0]</em> gives you the first value. <em>revenues[11]</em> gives you the twelfth. <em>revenues[-1]</em> gives you the last item (negative indexing counts backwards). You almost never need to use indexing directly — built-in functions like max(), min(), sum() handle lists automatically.
  </div>
</div>
<div class="warn-box">
  <div class="wb-label">⚠ THE ZERO-INDEX TRAP</div>
  <p>Python starts counting at 0. A list with 12 items has positions 0 through 11. If you try revenues[12] on a 12-item list, Python throws an IndexError because position 12 does not exist. When converting to "human" month numbers, always add 1: month_number + 1.</p>
</div>`,

    id:'loops',name:'For Loops',icon:'🔄',xp:100,time:'20 min',deps:['lists'],
    blurb:'Automatically scan every row of business data.',
    learn:`
<div class="lesson-section">
  <div class="ls-label">Why loops are the engine of AI-BOS</div>
  <div class="ls-body">
    A loop runs the same block of code <strong>on every item in a list, automatically</strong>. Without loops, to check 500 rows of sales data you would need to write 500 nearly identical lines of code. With a loop, you write it once and Python handles all 500.
    <br><br>
    <strong>The variance detection system, the alert engine, and the cash flow analyser all use loops</strong> to scan every row of a business's data. When you later call detect_variances(df), a loop is running under the hood on every single transaction row.
  </div>
</div>
<div class="lesson-section">
  <div class="ls-label">How indentation works — this is critical</div>
  <div class="ls-body">
    Python uses <strong>indentation (spaces)</strong> to know what belongs inside the loop. Unlike most languages that use {} brackets, Python uses whitespace. <strong>Every line that should run inside the loop must be indented with exactly 4 spaces (or one Tab).</strong>
    <br><br>
    If your indentation is wrong, Python either crashes or silently runs code outside the loop — giving you wrong results with no error message. This is one of the most common beginner bugs.
  </div>
</div>
<div class="analogy-box">
  <div class="ab-label">💡 ANALOGY</div>
  <p>A loop is like a factory conveyor belt. You program the worker once: "check if this box is heavy, if yes put a red sticker on it." Then you hit play and the belt sends every box through that same worker automatically. The worker's instructions are the indented code block.</p>
</div>
<div class="warn-box">
  <div class="wb-label">⚠ enumerate() vs range(len())</div>
  <p>You will see two patterns: <strong>for i, item in enumerate(list)</strong> and <strong>for i in range(len(list))</strong>. Use enumerate() — it is cleaner and gives you both the index AND the value simultaneously. range(len()) forces you to then write list[i] to get the value, adding an extra step and an extra potential error.</p>
</div>`,

<span class="kw">for</span> <span class="nm">i</span>, <span class="nm">rev</span> <span class="kw">in</span> <span class="fn">enumerate</span>(<span class="nm">revenues</span>):
    <span class="kw">if</span> <span class="nm">rev</span> < <span class="nm">40000</span>:
        <span class="fn">print</span>(<span class="st">f"⚠ Month </span><span class="nm">{i+1}</span><span class="st">: low revenue K</span><span class="nm">{rev:,}</span><span class="st">"</span>)</pre></div>
<div class="line-breakdown">
  <div class="lb-item">
    <div class="lb-code"><span class="kw">for</span> <span class="nm">i</span>, <span class="nm">rev</span> <span class="kw">in</span> <span class="fn">enumerate</span>(<span class="nm">revenues</span>):</div>
    <div class="lb-arrow">→</div>
    <div class="lb-explain"><strong>enumerate()</strong> gives you two things each iteration: the position number (i) and the value (rev). The comma in <strong>i, rev</strong> is called unpacking — Python automatically splits the pair into your two variables. The colon at the end is mandatory — it signals the start of the indented block.</div>
  </div>
  <div class="lb-item">
    <div class="lb-code">    <span class="kw">if</span> <span class="nm">rev</span> < <span class="nm">40000</span>:</div>
    <div class="lb-arrow">→</div>
    <div class="lb-explain">4 spaces of indentation — this line is inside the loop. It runs once per item. The if statement checks the condition for the current item only.</div>
  </div>
  <div class="lb-item">
    <div class="lb-code"><span class="nm">i+1</span></div>
    <div class="lb-arrow">→</div>
    <div class="lb-explain">enumerate() starts at 0, but months start at 1 for humans. Adding 1 converts from zero-indexed to human-readable. Month 0 → Month 1, Month 1 → Month 2, etc.</div>
  </div>
</div>`,

    learn:`
<div class="lesson-section">
  <div class="ls-label">The difference between a list and a dict</div>
  <div class="ls-body">
    A list stores values by <strong>position</strong>: revenues[0], revenues[1]. A dictionary stores values by <strong>name</strong>: month["revenue"], month["costs"]. The name is called a <em>key</em> and what it maps to is called a <em>value</em>.
    <br><br>
    Think of a spreadsheet row: column A is "Revenue", column B is "Costs", column C is "Month". A dictionary is exactly that row — each column name (key) maps to the cell value. <strong>When pandas loads your spreadsheet, each row becomes a dictionary.</strong>
  </div>
</div>
<div class="lesson-section">
  <div class="ls-label">Why dicts matter for AI-BOS</div>
  <div class="ls-body">
    When you send data to the Claude API, you format it as a dictionary. When the API sends back structured results, they come back as dictionaries. When you read a database row from Supabase, it arrives as a dictionary. <strong>Dictionaries are the universal data format of AI-BOS's internal communication.</strong>
  </div>
</div>`,
    codeBreakdown:`
<div class="code-full"><pre><span class="nm">month</span> = {
    <span class="st">"name"</span>:    <span class="st">"January"</span>,
    <span class="st">"revenue"</span>: <span class="nm">45000</span>,
    <span class="st">"costs"</span>:   <span class="nm">28000</span>
}
<span class="nm">month</span>[<span class="st">"profit"</span>] = <span class="nm">month</span>[<span class="st">"revenue"</span>] - <span class="nm">month</span>[<span class="st">"costs"</span>]
<span class="fn">print</span>(<span class="st">f"</span><span class="nm">{month['name']}</span><span class="st"> profit: K</span><span class="nm">{month['profit']:,}</span><span class="st">"</span>)</pre></div>
<div class="line-breakdown">
  <div class="lb-item">
    <div class="lb-code">{<span class="st">"name"</span>: <span class="st">"January"</span>, ...}</div>
    <div class="lb-arrow">→</div>
    <div class="lb-explain">Curly braces create a dict (not a list — lists use square brackets). Each entry is <strong>key: value</strong> separated by a colon. Entries are separated by commas. Keys must be strings (in quotes). Values can be any type.</div>
  </div>
  <div class="lb-item">
    <div class="lb-code"><span class="nm">month</span>[<span class="st">"profit"</span>] = ...</div>
    <div class="lb-arrow">→</div>
    <div class="lb-explain">You can add new keys to a dict after creation, just like creating a new variable. This is how the Financial Engine adds calculated fields — it loads the raw data, then adds computed columns like "profit" and "margin".</div>
  </div>
  <div class="lb-item">
    <div class="lb-code"><span class="nm">month</span>[<span class="st">'name'</span>]</div>
    <div class="lb-arrow">→</div>
    <div class="lb-explain">Inside an f-string's curly braces, use <strong>single quotes</strong> for the dict key. The outer f-string already uses double quotes, so inner dict access must use single quotes to avoid conflicting.</div>
  </div>
</div>`,

    blurb:'Write a calculation once, use it for every business on the platform.',
    learn:`
<div class="lesson-section">
  <div class="ls-label">The core idea</div>
  <div class="ls-body">
    A function is a <strong>reusable block of code with a name</strong>. Instead of writing the profit calculation 200 times for 200 businesses, you write it once inside a function, give it a name, and then call that name whenever you need it.
    <br><br>
    <strong>The entire Financial Intelligence Engine is a collection of functions.</strong> calculate_pnl(), detect_variances(), forecast_cashflow(), score_health() — each is a function. When a business uploads their data, AI-BOS calls these functions in sequence and assembles the results into a dashboard.
  </div>
</div>
<div class="lesson-section">
  <div class="ls-label">Parameters and return values</div>
  <div class="ls-body">
    A function takes <strong>inputs (parameters)</strong> and produces <strong>outputs (return values)</strong>. Parameters go in the brackets after the function name. return sends the result back to whoever called the function.
    <br><br>
    <strong>Without return, the function does the work but the result disappears.</strong> You need return to capture and use the result. Think of it as: parameters = the raw ingredients going into the factory, return = the finished product coming out.
  </div>
</div>
<div class="tip-box">
  <div class="tb-label">✓ RETURNING MULTIPLE VALUES</div>
  <p>Python functions can return multiple values separated by commas: <strong>return profit, margin</strong>. Capture them with: <strong>p, m = calculate_profit(revenue, costs)</strong>. This comma-separated assignment is called unpacking — same concept as enumerate().</p>
</div>`,
    codeBreakdown:`
<div class="code-full"><pre><span class="kw">def</span> <span class="fn">calculate_profit</span>(<span class="nm">revenue</span>, <span class="nm">costs</span>):
    <span class="nm">profit</span> = <span class="nm">revenue</span> - <span class="nm">costs</span>
    <span class="nm">margin</span> = <span class="fn">round</span>((<span class="nm">profit</span> / <span class="nm">revenue</span>) * <span class="nm">100</span>, <span class="nm">1</span>)
    <span class="kw">return</span> <span class="nm">profit</span>, <span class="nm">margin</span>

<span class="nm">p</span>, <span class="nm">m</span> = <span class="fn">calculate_profit</span>(<span class="nm">45000</span>, <span class="nm">28000</span>)
<span class="fn">print</span>(<span class="st">f"Profit: K{p:,} | Margin: {m}%"</span>)</pre></div>
<div class="line-breakdown">
  <div class="lb-item">
    <div class="lb-code"><span class="kw">def</span> <span class="fn">calculate_profit</span>(<span class="nm">revenue</span>, <span class="nm">costs</span>):</div>
    <div class="lb-arrow">→</div>
    <div class="lb-explain"><strong>def</strong> is short for "define" — you are defining a new function. The name follows Python variable naming rules (no spaces, underscores for spaces). The parameters (revenue, costs) are placeholder names — they receive whatever values are passed in when the function is called.</div>
  </div>
  <div class="lb-item">
    <div class="lb-code"><span class="kw">return</span> <span class="nm">profit</span>, <span class="nm">margin</span></div>
    <div class="lb-arrow">→</div>
    <div class="lb-explain">Returns two values. Python bundles them into a pair automatically. The line <strong>p, m = calculate_profit(45000, 28000)</strong> unpacks that pair — p gets profit, m gets margin. If you only write <strong>result = calculate_profit()</strong>, result will be a tuple (17000, 37.8) — both values together.</div>
  </div>
  <div class="lb-item">
    <div class="lb-code"><span class="fn">round</span>(<span class="nm">value</span>, <span class="nm">1</span>)</div>
    <div class="lb-arrow">→</div>
    <div class="lb-explain">round() is a Python built-in. First argument is the number, second is how many decimal places to keep. round(37.844, 1) = 37.8. Without this, Python shows 37.77777777... which looks unprofessional in a report.</div>
  </div>
</div>`,

    id:'ifelse',name:'If / Else Logic',icon:'🧠',xp:80,time:'14 min',deps:['funcs'],
    blurb:'Make decisions: trigger alerts, classify status, route logic.',
    learn:`
<div class="lesson-section">
  <div class="ls-label">Decision logic in AI-BOS</div>
  <div class="ls-body">
    Every decision the Financial Engine makes runs through if/else. "If margin is below 10%, classify as CRITICAL." "If cash flow will go negative in 60 days, send an alert." "If revenue grew more than 20%, flag as a growth opportunity."
    <br><br>
    <strong>If/else is how the engine makes judgements</strong>. Without it, the engine could only calculate — it could not draw conclusions. The intelligence layer of AI-BOS is, at its foundation, a well-engineered set of conditional rules applied to data.
  </div>
</div>
<div class="lesson-section">
  <div class="ls-label">elif — the "otherwise if" chain</div>
  <div class="ls-body">
    When you have more than two outcomes, use <strong>elif</strong> (else if). Python checks each condition in order. The moment one is True, it runs that block and skips all remaining elif and else. <strong>Order matters</strong> — if you check for margin > 0 before margin > 25, everything will be caught by the first condition and the rest never run.
  </div>
</div>
<div class="warn-box">
  <div class="wb-label">⚠ == vs = IN CONDITIONS</div>
  <p>Inside an if condition, use <strong>==</strong> (double equals) to CHECK equality. Single <strong>=</strong> is for ASSIGNMENT (storing a value). Writing <strong>if margin = 15:</strong> is a SyntaxError. Writing <strong>if margin == 15:</strong> checks if margin equals 15. This trips up beginners constantly.</p>
</div>`,
    codeBreakdown:`
<div class="code-full"><pre><span class="kw">def</span> <span class="fn">generate_alert</span>(<span class="nm">margin</span>, <span class="nm">prev_margin</span>):
    <span class="nm">change</span> = <span class="nm">margin</span> - <span class="nm">prev_margin</span>

    <span class="kw">if</span> <span class="nm">margin</span> < <span class="nm">5</span>:
        <span class="kw">return</span> <span class="st">f"🔴 CRITICAL: margin at {margin}%"</span>
    <span class="kw">elif</span> <span class="nm">change</span> < -<span class="nm">10</span>:
        <span class="kw">return</span> <span class="st">f"🟡 WARN: margin dropped {change:.1f}%"</span>
    <span class="kw">elif</span> <span class="nm">margin</span> > <span class="nm">30</span>:
        <span class="kw">return</span> <span class="st">f"🚀 GREAT: strong margin {margin}%"</span>
    <span class="kw">else</span>:
        <span class="kw">return</span> <span class="st">f"✓ Stable at {margin}%"</span></pre></div>
<div class="line-breakdown">
  <div class="lb-item">
    <div class="lb-code"><span class="kw">if</span> <span class="nm">margin</span> < <span class="nm">5</span>:</div>
    <div class="lb-arrow">→</div>
    <div class="lb-explain">Checked first. If margin is below 5, return the CRITICAL message immediately. The function stops here — elif and else are never evaluated.</div>
  </div>
  <div class="lb-item">
    <div class="lb-code"><span class="kw">elif</span> <span class="nm">change</span> < -<span class="nm">10</span>:</div>
    <div class="lb-arrow">→</div>
    <div class="lb-explain">Only evaluated if the first condition was False. Checks a different thing (the change from last month). Note <strong>-10</strong> — negative number. If margin dropped by more than 10 percentage points, trigger a warning.</div>
  </div>
  <div class="lb-item">
    <div class="lb-code"><span class="kw">else</span>:</div>
    <div class="lb-arrow">→</div>
    <div class="lb-explain">The catch-all. Only runs if ALL previous conditions were False. else has no condition — it catches everything that did not match above. It is always last and has no colon-condition pair.</div>
  </div>
</div>`,

    learn:`
<div class="lesson-section"><div class="ls-label">What a DataFrame is</div><div class="ls-body">When you load a file with pandas, it becomes a <strong>DataFrame</strong> — a table with rows and columns, like a spreadsheet in memory. The variable df is the standard name (short for DataFrame). Every row is a record, every column has a name.<br><br>A DataFrame is smarter than a list of dicts. It has built-in functions for filtering, calculating, grouping, and summarising that handle thousands of rows in milliseconds. This is why pandas is essential for the Financial Engine.</div></div>

    codeBreakdown:`
<div class="code-full"><pre><span class="kw">def</span> <span class="fn">analyse_pnl</span>(<span class="nm">df</span>):
    <span class="nm">total_rev</span>  = <span class="nm">df</span>[<span class="st">"revenue"</span>].<span class="fn">sum</span>()
    <span class="nm">total_cost</span> = <span class="nm">df</span>[<span class="st">"costs"</span>].<span class="fn">sum</span>()
    <span class="nm">total_profit</span> = <span class="nm">total_rev</span> - <span class="nm">total_cost</span>
    <span class="nm">avg_margin</span> = <span class="fn">round</span>(<span class="nm">df</span>[<span class="st">"margin_pct"</span>].<span class="fn">mean</span>(), <span class="nm">1</span>)
    <span class="nm">best_idx</span>   = <span class="nm">df</span>[<span class="st">"profit"</span>].<span class="fn">idxmax</span>()
    <span class="kw">return</span> {
        <span class="st">"total_revenue"</span>: <span class="nm">total_rev</span>,
        <span class="st">"total_costs"</span>:   <span class="nm">total_cost</span>,
        <span class="st">"total_profit"</span>:  <span class="nm">total_profit</span>,
        <span class="st">"avg_margin"</span>:    <span class="nm">avg_margin</span>,
        <span class="st">"best_month"</span>:    <span class="nm">df</span>.<span class="fn">loc</span>[<span class="nm">best_idx</span>, <span class="st">"month"</span>],
        <span class="st">"worst_month"</span>:   <span class="nm">df</span>.<span class="fn">loc</span>[<span class="nm">df</span>[<span class="st">"profit"</span>].<span class="fn">idxmin</span>(), <span class="st">"month"</span>]
    }</pre></div>`,

    id:'fecash',name:'Cash Flow Forecasting',icon:'📈',xp:150,time:'32 min',deps:['fepnl'],
    blurb:'Predict the next 90 days of cash — the killer feature.',
    learn:`<div class="lesson-section"><div class="ls-label">Why this is the most valuable feature</div><div class="ls-body">Cash flow forecasting is the #1 thing business owners ask for and rarely have. Most businesses discover a cash problem when it hits — not before. A 30/60/90-day forecast gives them time to act. <strong>This single feature justifies the monthly subscription for most customers.</strong><br><br>The approach: use the average of the last 3 months as the projected monthly net cash change. Apply it forward. Flag if projected cash goes negative.</div></div>`,
    codeBreakdown:`
<div class="code-full"><pre><span class="kw">def</span> <span class="fn">forecast_cashflow</span>(<span class="nm">df</span>, <span class="nm">current_cash</span>=<span class="nm">0</span>, <span class="nm">months_ahead</span>=<span class="nm">3</span>):
    <span class="nm">recent_profit</span> = <span class="nm">df</span>.<span class="fn">tail</span>(<span class="nm">3</span>)[<span class="st">"profit"</span>].<span class="fn">mean</span>()
    <span class="nm">running_cash</span>  = <span class="nm">df</span>[<span class="st">"profit"</span>].<span class="fn">sum</span>() + <span class="nm">current_cash</span>
    <span class="nm">forecast</span> = []
    <span class="kw">for</span> <span class="nm">m</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="nm">1</span>, <span class="nm">months_ahead</span> + <span class="nm">1</span>):
        <span class="nm">running_cash</span> += <span class="nm">recent_profit</span>
        <span class="nm">alert</span> = <span class="st">"⚠ NEGATIVE"</span> <span class="kw">if</span> <span class="nm">running_cash</span> < <span class="nm">0</span> <span class="kw">else</span> <span class="st">"✓ Positive"</span>
        <span class="nm">forecast</span>.<span class="fn">append</span>({
            <span class="st">"month_ahead"</span>: <span class="nm">m</span>,
            <span class="st">"projected_cash"</span>: <span class="fn">round</span>(<span class="nm">running_cash</span>),
            <span class="st">"status"</span>: <span class="nm">alert</span>
        })
    <span class="kw">return</span> <span class="nm">forecast</span></pre></div>`,
    exercise:{task:'Run a 3-month cash flow forecast.',steps:['Write forecast_cashflow(df, current_cash=50000, months_ahead=3)','Call it with your test data','Print each forecast month: month number, projected cash, status','Paste the 3 forecast lines'],inputLabel:'Paste your 3 forecast lines:',placeholder:'Month 1: K66,333 ✓ Positive\nMonth 2: K82,666 ✓ Positive\nMonth 3: K98,999 ✓ Positive',
    grader:(v)=>{if(v.includes('Month')&&v.includes('K')&&(v.includes('Positive')||v.includes('NEGATIVE'))) return {pass:true,msg:'Cash flow forecast running. This is displayed as a line chart on the AI-BOS dashboard. The "status" field drives the colour of the chart line — green for positive, red for negative.'};return {fail:true,msg:'Make sure the function returns a list of dicts. Call it, then loop: for item in forecast: print(f"Month {item[\'month_ahead\']}: K{item[\'projected_cash\']:,} {item[\'status\']}")'}}},

  {
    id:'fevar',name:'Variance Detection',icon:'🚨',xp:130,time:'26 min',deps:['fecash'],
    blurb:'Automatically flag the months where something went wrong.',
    learn:`<div class="lesson-section"><div class="ls-label">The alert engine core</div><div class="ls-body">Variance detection compares each month to the previous month. If the change exceeds a threshold (e.g. revenue dropped more than 15%), it flags that month as an alert. These alerts become the "⚠ Alerts" section of the dashboard and are sent to Claude for AI explanation.</div></div>`,
    codeBreakdown:`
<div class="code-full"><pre><span class="kw">def</span> <span class="fn">detect_variances</span>(<span class="nm">df</span>, <span class="nm">threshold</span>=<span class="nm">0.15</span>):
    <span class="nm">alerts</span> = []
    <span class="kw">for</span> <span class="nm">i</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="nm">1</span>, <span class="fn">len</span>(<span class="nm">df</span>)):
        <span class="nm">prev_rev</span> = <span class="nm">df</span>.iloc[<span class="nm">i</span>-<span class="nm">1</span>][<span class="st">"revenue"</span>]
        <span class="nm">curr_rev</span> = <span class="nm">df</span>.iloc[<span class="nm">i</span>][<span class="st">"revenue"</span>]
        <span class="nm">pct_chg</span>  = ((<span class="nm">curr_rev</span> - <span class="nm">prev_rev</span>) / <span class="nm">prev_rev</span>) * <span class="nm">100</span>
        <span class="kw">if</span> <span class="fn">abs</span>(<span class="nm">pct_chg</span>) > <span class="nm">threshold</span> * <span class="nm">100</span>:
            <span class="nm">alerts</span>.<span class="fn">append</span>({
                <span class="st">"month"</span>: <span class="nm">df</span>.iloc[<span class="nm">i</span>][<span class="st">"month"</span>],
                <span class="st">"change_pct"</span>: <span class="fn">round</span>(<span class="nm">pct_chg</span>, <span class="nm">1</span>),
                <span class="st">"direction"</span>: <span class="st">"drop"</span> <span class="kw">if</span> <span class="nm">pct_chg</span> < <span class="nm">0</span> <span class="kw">else</span> <span class="st">"spike"</span>
            })
    <span class="kw">return</span> <span class="nm">alerts</span></pre></div>`,
    exercise:{task:'Run variance detection and print alerts.',steps:['Write detect_variances(df, threshold=0.10)','Call it on your data','Print each alert: month, direction, change_pct','Paste output'],inputLabel:'Paste your alert output:',placeholder:'Feb: drop of -6.7%\nor\nNo variances detected above threshold',
    grader:(v)=>{if(v.includes('drop')||v.includes('spike')||v.includes('detected')) return {pass:true,msg:'Variance detection working. Each alert in this list is passed to Claude with the question: "Why might this have happened and what should the owner do?" — that is the AI layer on top.'};return {fail:true,msg:'Call the function and loop through results: for a in alerts: print(f\"{a[\'month\']}: {a[\'direction\']} of {a[\'change_pct\']}%\")'}}},
    errors:[]

  {
    id:'fehealth',name:'Business Health Score',icon:'🏥',xp:120,time:'20 min',deps:['fevar'],
    blurb:'One number that tells the whole financial story.',
    learn:`<div class="lesson-section"><div class="ls-label">Why a single score matters</div><div class="ls-body">Business owners are not data analysts. Showing them 20 metrics at once creates paralysis. A single 0–100 health score — displayed prominently at the top of the dashboard — gives instant orientation. <strong>Everything else on the dashboard is the detail behind that one number.</strong></div></div>`,
    codeBreakdown:`
<div class="code-full"><pre><span class="kw">def</span> <span class="fn">health_score</span>(<span class="nm">pnl</span>, <span class="nm">alerts</span>):
    <span class="nm">margin_pts</span> = <span class="fn">min</span>(<span class="nm">pnl</span>[<span class="st">"avg_margin"</span>] * <span class="nm">1.5</span>, <span class="nm">50</span>)
    <span class="nm">trend</span>      = <span class="nm">pnl</span>[<span class="st">"total_revenue"</span>] - <span class="nm">pnl</span>[<span class="st">"total_costs"</span>]
    <span class="nm">trend_pts</span>  = <span class="nm">30</span> <span class="kw">if</span> <span class="nm">trend</span> > <span class="nm">0</span> <span class="kw">else</span> <span class="nm">10</span>
    <span class="nm">alert_pen</span>  = <span class="fn">len</span>(<span class="nm">alerts</span>) * <span class="nm">8</span>
    <span class="nm">score</span>      = <span class="fn">max</span>(<span class="nm">0</span>, <span class="fn">min</span>(<span class="nm">100</span>, <span class="nm">margin_pts</span> + <span class="nm">trend_pts</span> - <span class="nm">alert_pen</span>))
    <span class="nm">label</span>      = (<span class="st">"Critical"</span> <span class="kw">if</span> <span class="nm">score</span>&lt;<span class="nm">30</span> <span class="kw">else</span>
                  <span class="st">"At Risk"</span>  <span class="kw">if</span> <span class="nm">score</span>&lt;<span class="nm">55</span> <span class="kw">else</span>
                  <span class="st">"Healthy"</span>  <span class="kw">if</span> <span class="nm">score</span>&lt;<span class="nm">80</span> <span class="kw">else</span> <span class="st">"Excellent"</span>)
    <span class="kw">return</span> <span class="fn">round</span>(<span class="nm">score</span>), <span class="nm">label</span></pre></div>`,
    exercise:{task:'Generate a health score for your test data.',steps:['Call analyse_pnl(df) to get pnl dict','Call detect_variances(df) to get alerts list','Call health_score(pnl, alerts) to get score and label','Print: "Business health: 74/100 — Healthy"','Paste your output'],inputLabel:'Paste your health score output line:',placeholder:'Business health: 74/100 — Healthy',
    grader:(v)=>{if(/\d+\/100/.test(v)||v.includes('health')) return {pass:true,msg:'Health score generated. You have now built the complete Financial Intelligence Engine core — P&L, cash flow forecast, variance detection, and health score. Four functions, four outputs. These feed directly into the Streamlit dashboard in Stage 5.'};return {fail:true,msg:'Print format: print(f"Business health: {score}/100 — {label}")'}}},
    errors:[]
  },
  ]
},
{
  id:'s4',name:'Claude API',color:'#10b981',time:'Days 10–12',
  skills:[
  {
    id:'apikey',name:'Claude API Key Setup',icon:'🔑',xp:60,time:'10 min',deps:['fehealth'],
    blurb:'Get authenticated to talk to Claude from your code.',
    learn:`<div class="lesson-section"><div class="ls-label">What an API key is</div><div class="ls-body">An API key is a password that proves to Anthropic's servers that you are authorised to use Claude programmatically. Without it, your API calls are rejected. <strong>Never put your API key directly in your code file</strong> — if you share the file or push it to GitHub, anyone can use your key and you pay for their usage.</div></div>
<div class="tip-box"><div class="tb-label">✓ SAFE KEY STORAGE</div><p>Store keys as environment variables. In VS Code terminal: <strong>export ANTHROPIC_API_KEY="sk-ant-..."</strong> (Mac/Linux) or <strong>$env:ANTHROPIC_API_KEY="sk-ant-..."</strong> (Windows). Your code then reads it with os.environ.get() — the key never appears in your source code.</p></div>`,
    codeBreakdown:`
<div class="code-full"><pre><span class="kw">import</span> <span class="nm">os</span>
<span class="kw">import</span> <span class="nm">anthropic</span>

<span class="nm">client</span> = <span class="nm">anthropic</span>.<span class="fn">Anthropic</span>(
    <span class="nm">api_key</span>=<span class="nm">os</span>.environ.<span class="fn">get</span>(<span class="st">"ANTHROPIC_API_KEY"</span>)
)
<span class="fn">print</span>(<span class="st">"Client ready:"</span>, <span class="nm">client</span> <span class="kw">is not None</span>)</pre></div>`,
    exercise:{task:'Set up your API key and verify the client initialises.',steps:['Go to console.anthropic.com and create an API key','Set the environment variable in your terminal','Run the code above','Print "Client ready: True"','Paste your output'],inputLabel:'Paste your output:',placeholder:'Client ready: True',
    grader:(v)=>{if(v.includes('True')) return {pass:true,msg:'Client initialised. Every Claude API call in AI-BOS goes through this client object.'};return {fail:true,msg:'If you get AuthenticationError, the API key was not set correctly. Check the environment variable name matches exactly: ANTHROPIC_API_KEY'}}},
    errors:[{err:"AuthenticationError",why:"The API key is wrong, expired, or was not set in the environment.",fix:'Double-check the key value in console.anthropic.com. Re-run the export command in the SAME terminal window you use to run Python. Environment variables only apply to the terminal session they were set in.'}]
  },
  {
    id:'apicall',name:'First API Call',icon:'📡',xp:140,time:'22 min',deps:['apikey'],
    blurb:'Connect your calculations to AI intelligence.',
    learn:`<div class="lesson-section"><div class="ls-label">How the API call works</div><div class="ls-body">You send Claude a message. Claude returns a response. The messages parameter is a list of dicts — each dict has a "role" (user or assistant) and "content" (the text). For a single question, you send one message with role "user". Claude responds with an assistant message.<br><br><strong>The model string matters.</strong> Different models have different costs and capabilities. Use claude-sonnet-4-20250514 for AI-BOS — it is the best balance of intelligence and cost for financial analysis.</div></div>`,
    codeBreakdown:`
<div class="code-full"><pre><span class="nm">response</span> = <span class="nm">client</span>.messages.<span class="fn">create</span>(
    <span class="nm">model</span>=<span class="st">"claude-sonnet-4-20250514"</span>,
    <span class="nm">max_tokens</span>=<span class="nm">1024</span>,
    <span class="nm">messages</span>=[{
        <span class="st">"role"</span>:    <span class="st">"user"</span>,
        <span class="st">"content"</span>: <span class="st">"Say: AI-BOS Financial Engine connected."</span>
    }]
)
<span class="fn">print</span>(<span class="nm">response</span>.content[<span class="nm">0</span>].text)</pre></div>
<div class="line-breakdown">
  <div class="lb-item"><div class="lb-code"><span class="nm">max_tokens</span>=<span class="nm">1024</span></div><div class="lb-arrow">→</div><div class="lb-explain">Controls the maximum length of Claude's response. 1 token ≈ 0.75 words. 1024 tokens ≈ 750 words — plenty for a financial analysis. Set higher for longer reports. You are charged per token.</div></div>
  <div class="lb-item"><div class="lb-code"><span class="nm">response</span>.content[<span class="nm">0</span>].text</div><div class="lb-arrow">→</div><div class="lb-explain">The response has a content list. Element [0] is the first (and usually only) response block. .text extracts the actual text string. This is the AI's answer — ready to display or process.</div></div>
</div>`,
    exercise:{task:'Make your first successful API call.',steps:['Write the API call with the test prompt: "List 3 things a restaurant owner should monitor monthly. Be brief."','Print the response text','Paste Claude\'s response'],inputLabel:'Paste Claude\'s response:',placeholder:'1. Food costs...\n2. Staff hours...\n3. Table turnover...',
    grader:(v)=>{if(v.trim().length>50) return {pass:true,msg:'API connection confirmed. Claude responded with '+v.trim().split(/\s+/).length+' words. The AI intelligence layer is live. From here, you will inject your P&L data into these prompts to get real financial analysis.'};return {fail:true,msg:'The response should be several lines of text. If you see an error, check: (1) API key is set, (2) model name is correct, (3) messages format has role and content keys.'}}},
    errors:[{err:"APIConnectionError",why:"Cannot reach Anthropic's servers — usually a network issue.",fix:'Check internet connection. Try: curl https://api.anthropic.com in terminal. If that fails, the issue is network-level.'},{err:"RateLimitError",why:"You have exceeded the allowed number of requests per minute.",fix:'Wait 60 seconds and try again. For production, add time.sleep(1) between calls.'}]
  },
  {
    id:'prompt',name:'Prompt Engineering',icon:'✍️',xp:150,time:'30 min',deps:['apicall'],
    blurb:'Write prompts that turn financial data into expert insight.',
    learn:`<div class="lesson-section"><div class="ls-label">What makes a good AI-BOS prompt</div><div class="ls-body">A weak prompt: "Analyse my business." A strong prompt gives Claude: (1) a role to play, (2) structured context data, (3) a specific output format, (4) constraints on tone and length.<br><br><strong>The quality of your prompts is the quality of your product.</strong> A well-engineered prompt template is a core AI-BOS asset — it is what differentiates your financial insight from a generic AI chat response.</div></div>
<div class="tip-box"><div class="tb-label">✓ THE SYSTEM + USER STRUCTURE</div><p>Use a <strong>system</strong> message to define Claude's role and general behaviour (this persists across the conversation). Use the <strong>user</strong> message for the specific data and question. The system message is set once; only the user message changes with each business's data.</p></div>`,
    codeBreakdown:`
<div class="code-full"><pre><span class="kw">def</span> <span class="fn">get_ai_analysis</span>(<span class="nm">pnl</span>, <span class="nm">alerts</span>, <span class="nm">score</span>):
    <span class="nm">prompt</span> = <span class="st">f"""
Business financial data:
- Annual revenue: K{pnl['total_revenue']:,}
- Annual profit: K{pnl['total_profit']:,}
- Average margin: {pnl['avg_margin']}%
- Health score: {score}/100
- Alert count: {len(alerts)}
- Best month: {pnl['best_month']}
- Worst month: {pnl['worst_month']}

Provide exactly 3 specific, actionable recommendations.
Each must reference the data above. No generic advice.
Use plain English. Maximum 2 sentences per recommendation.
"""</span>
    <span class="nm">r</span> = <span class="nm">client</span>.messages.<span class="fn">create</span>(
        <span class="nm">model</span>=<span class="st">"claude-sonnet-4-20250514"</span>,
        <span class="nm">max_tokens</span>=<span class="nm">800</span>,
        <span class="nm">system</span>=<span class="st">"You are an expert CFO advising African SMEs. Be direct, specific, and practical."</span>,
        <span class="nm">messages</span>=[{<span class="st">"role"</span>:<span class="st">"user"</span>,<span class="st">"content"</span>:<span class="nm">prompt</span>}]
    )
    <span class="kw">return</span> <span class="nm">r</span>.content[<span class="nm">0</span>].text</pre></div>`,
    exercise:{task:'Write and test the full get_ai_analysis() function.',steps:['Write the function using your test pnl dict and alerts list','Call it and print the response','Verify: does it mention specific numbers from your data?','Paste the AI response'],inputLabel:'Paste Claude\'s 3 recommendations:',placeholder:'1. Your K[amount] revenue suggests...\n2. The [month] drop indicates...\n3. With a [margin]% margin...',
    grader:(v)=>{if(v.trim().length>100&&(v.includes('1.')||v.includes('1)')||v.match(/revenue|profit|margin|cost/i))) return {pass:true,msg:'The AI analysis is referencing your actual financial data — not generic advice. This is the core of what makes AI-BOS valuable: personalised, data-driven intelligence for each specific business.'};if(v.trim().length>50) return {partial:true,msg:'Response received. Check that the recommendations mention specific numbers from your pnl dict. If they are generic, tighten your prompt to say "you MUST cite the actual figures provided."'};return {fail:true,msg:'Call get_ai_analysis(pnl, alerts, score) after creating those three objects. The function should return a string — assign it to result and print(result).'}}},
    errors:[{err:"Response is generic and ignores the data",why:"The prompt is not specific enough about requiring data references, or the data was not embedded correctly in the f-string.",fix:'Add explicit instruction: "Every recommendation must cite specific numbers from the data above. Generic advice will be rejected." Also verify your f-string is embedding the actual values by printing the prompt variable before sending it.'}]
  },
  {
    id:'apijson',name:'Structured JSON Output',icon:'🗃️',xp:130,time:'25 min',deps:['prompt'],
    blurb:'Get structured data back from Claude — not a wall of text.',
    learn:`<div class="lesson-section"><div class="ls-label">Why structured output matters</div><div class="ls-body">If Claude returns plain text, you can display it but you cannot interact with it programmatically. If it returns JSON, each recommendation becomes a card on the dashboard, each field becomes a UI element, and you can sort/filter/prioritise.<br><br><strong>Structured output is the difference between displaying AI text and building an AI product.</strong></div></div>
<div class="warn-box"><div class="wb-label">⚠ ALWAYS ADD json.loads() SAFETY</div><p>Claude usually returns valid JSON but occasionally adds a sentence before or after the JSON block. Wrap your json.loads() in a try/except block. If it fails, fall back to displaying the raw text.</p></div>`,
    codeBreakdown:`
<div class="code-full"><pre><span class="kw">import</span> <span class="nm">json</span>

<span class="nm">prompt</span> = <span class="st">"""
Return ONLY a valid JSON array. No other text whatsoever.
Format: [{"title":"...","action":"...","priority":"high/medium/low"}]
Based on: margin 12%, revenue dropped 20% last month, costs rising.
"""</span>

<span class="nm">r</span> = <span class="nm">client</span>.messages.<span class="fn">create</span>(<span class="nm">model</span>=<span class="st">"claude-sonnet-4-20250514"</span>,
    <span class="nm">max_tokens</span>=<span class="nm">600</span>, <span class="nm">messages</span>=[{<span class="st">"role"</span>:<span class="st">"user"</span>,<span class="st">"content"</span>:<span class="nm">prompt</span>}])

<span class="kw">try</span>:
    <span class="nm">recs</span> = <span class="nm">json</span>.<span class="fn">loads</span>(<span class="nm">r</span>.content[<span class="nm">0</span>].text)
    <span class="kw">for</span> <span class="nm">rec</span> <span class="kw">in</span> <span class="nm">recs</span>:
        <span class="fn">print</span>(<span class="st">f"[{rec['priority'].upper()}] {rec['title']}"</span>)
<span class="kw">except</span>:
    <span class="fn">print</span>(<span class="nm">r</span>.content[<span class="nm">0</span>].text)</pre></div>`,
    exercise:{task:'Get structured recommendations from Claude.',steps:['Write the JSON prompt above','Parse the response with json.loads()','Print each recommendation as: [PRIORITY] Title','Paste your output'],inputLabel:'Paste your structured output lines:',placeholder:'[HIGH] Reduce variable costs immediately\n[HIGH] Address revenue decline in core segment\n[MEDIUM] Review pricing strategy',
    grader:(v)=>{if((v.includes('[HIGH]')||v.includes('[MEDIUM]')||v.includes('[LOW]'))&&v.split('\n').filter(l=>l.trim()).length>=2) return {pass:true,msg:'Structured JSON output working. Each of these recommendations becomes a card in the Streamlit dashboard with colour-coded priority badges. You have completed the Claude API stage — the intelligence layer is fully wired.'};if(v.includes('{')) return {partial:true,msg:'Looks like raw JSON — add the for loop to extract and print each recommendation.'};return {fail:true,msg:'Claude may have added text before the JSON. Try adding to the prompt: "Start your response with [ and end with ]. No other characters."'}}},
    errors:[{err:"json.JSONDecodeError",why:"Claude returned text that is not valid JSON — maybe added an explanation before the JSON block.",fix:'Add to your prompt: "Output must begin with [ and contain nothing else." Also wrap in try/except so the raw text is shown as fallback.'}]
  },
  ]
},
{

  {
    id:'stbasic',name:'Streamlit Basics',icon:'🖥️',xp:100,time:'18 min',deps:['apijson'],
    blurb:'Build a web interface in Python — no HTML, no JavaScript.',
    learn:`<div class="lesson-section"><div class="ls-label">What Streamlit does</div><div class="ls-body">Streamlit converts Python scripts into interactive web apps. Every time you run <strong>streamlit run aibos.py</strong>, it opens a browser tab with your app. Every Python variable you display with st. functions appears as a UI element. <strong>It is the fastest path from Python code to a live product.</strong><br><br>The app re-runs from top to bottom every time a user interacts with it. This is different from most web frameworks — you do not handle events explicitly, you just write top-to-bottom Python and Streamlit handles the re-running.</div></div>`,
    codeBreakdown:`
<div class="code-full"><pre><span class="kw">import</span> <span class="nm">streamlit</span> <span class="kw">as</span> <span class="nm">st</span>

<span class="nm">col1</span>.<span class="fn">metric</span>(<span class="st">"Revenue"</span>, <span class="st">"K45,000"</span>, <span class="st">"+8%"</span>)

<span class="nm">col3</span>.<span class="fn">metric</span>(<span class="st">"Health"</span>,  <span class="st">"82/100"</span>,  <span class="st">"Healthy"</span>)

    grader:(v)=>{const t=v.toLowerCase();if(t.includes('revenue')||t.includes('profit')) return {pass:true,msg:'Streamlit dashboard is live. You just built a web app in 8 lines of Python. The browser tab you see IS the AI-BOS dashboard — add your Engine functions to it and it becomes the real product.'};return {fail:true,msg:'Run: streamlit run dashboard.py in the terminal. A browser tab should open at localhost:8501. If it does not, check the terminal for error messages.'}}},

    blurb:'Let businesses drag and drop their spreadsheet into AI-BOS.',

    codeBreakdown:`
<div class="code-full"><pre><span class="kw">import</span> <span class="nm">plotly.express</span> <span class="kw">as</span> <span class="nm">px</span>
