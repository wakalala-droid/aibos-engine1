<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-BOS · Engine 1 Skill Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --bg2: #0d1424;
    --bg3: #121b30;
    --line: #1e2d4a;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --gold: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --card: #0f1929;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── STARFIELD ── */
  #stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star { position:absolute; background:#fff; border-radius:50%; animation: twinkle var(--d) ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.1} 50%{opacity:var(--op)} }

  /* ── HEADER ── */
  header {
    position: relative; z-index:10;
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(0,212,255,.04) 0%, transparent 100%);
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width:40px; height:40px; border-radius:10px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono',monospace; font-size:13px; font-weight:700; color:#fff;
  }
  .logo-text { font-size:20px; font-weight:800; letter-spacing:-.5px; }
  .logo-sub { font-size:11px; color:var(--muted); font-family:'Space Mono',monospace; margin-top:1px; }

  .header-right { display:flex; align-items:center; gap:24px; }
  .xp-bar-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .xp-label { font-size:11px; color:var(--muted); font-family:'Space Mono',monospace; }
  .xp-track { width:180px; height:8px; background:var(--bg3); border-radius:4px; overflow:hidden; }
  .xp-fill { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:4px; transition:width .6s cubic-bezier(.4,0,.2,1); }
  .level-badge {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    padding: 6px 14px; border-radius:20px;
    font-size:13px; font-weight:700; font-family:'Space Mono',monospace;
    white-space:nowrap;
  }

  /* ── STAGE PROGRESS BAR ── */
  .progress-strip {
    position:relative; z-index:10;
    display:flex; gap:0; border-bottom:1px solid var(--line);
    overflow-x:auto;
  }
  .stage-pill {
    flex:1; min-width:110px; padding:10px 8px;
    text-align:center; cursor:pointer;
    border-right:1px solid var(--line);
    transition: background .2s;
    position:relative;
  }
  .stage-pill:last-child { border-right:none; }
  .stage-pill:hover { background:var(--bg2); }
  .stage-pill.active { background:rgba(0,212,255,.06); }
  .stage-pill.done { background:rgba(16,185,129,.05); }
  .stage-pill .sp-num { font-size:10px; color:var(--muted); font-family:'Space Mono',monospace; }
  .stage-pill .sp-name { font-size:12px; font-weight:700; margin-top:2px; }
  .stage-pill .sp-bar { height:3px; background:var(--bg3); border-radius:2px; margin-top:8px; overflow:hidden; }
  .stage-pill .sp-bar-fill { height:100%; border-radius:2px; transition: width .4s; }
  .s1 { --sc: #00d4ff; } .s2 { --sc: #7c3aed; } .s3 { --sc: #f59e0b; }
  .s4 { --sc: #10b981; } .s5 { --sc: #f43f5e; } .s6 { --sc: #8b5cf6; }
  .stage-pill .sp-bar-fill { background: var(--sc); }
  .stage-pill .sp-name { color: var(--sc); }

  /* ── MAIN LAYOUT ── */
  .main { display:flex; position:relative; z-index:5; min-height: calc(100vh - 140px); }

  /* ── SKILL TREE PANEL ── */
  .tree-panel {
    flex:1; padding:32px 24px; overflow-y:auto;
    border-right:1px solid var(--line);
  }
  .stage-section { margin-bottom:48px; }
  .stage-header {
    display:flex; align-items:center; gap:12px; margin-bottom:20px;
    padding-bottom:12px; border-bottom:1px solid var(--line);
  }
  .stage-dot { width:10px; height:10px; border-radius:50%; background:var(--sc); flex-shrink:0; }
  .stage-title { font-size:16px; font-weight:800; color:var(--sc); }
  .stage-time { font-size:11px; color:var(--muted); font-family:'Space Mono',monospace; margin-left:auto; }

  .nodes-grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(210px,1fr)); gap:12px; }

  .skill-node {
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius:14px; padding:16px;
    cursor:pointer; position:relative; overflow:hidden;
    transition: all .2s ease;
  }
  .skill-node:hover { border-color: var(--sc); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.4); }
  .skill-node.completed { border-color: var(--green); background: rgba(16,185,129,.08); }
  .skill-node.locked { opacity:.45; cursor:not-allowed; }
  .skill-node.locked:hover { transform:none; box-shadow:none; }
  .skill-node.active-selected { border-color: var(--sc); box-shadow: 0 0 0 3px rgba(0,212,255,.15); }

  .node-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
  .node-icon { font-size:22px; line-height:1; }
  .node-status {
    width:20px; height:20px; border-radius:50%; border:2px solid var(--muted);
    display:flex; align-items:center; justify-content:center; font-size:10px;
    flex-shrink:0; transition: all .2s;
  }
  .skill-node.completed .node-status { background:var(--green); border-color:var(--green); color:#fff; }
  .skill-node.locked .node-status { background:var(--bg3); }

  .node-name { font-size:13px; font-weight:700; margin-bottom:4px; line-height:1.3; }
  .node-why { font-size:11px; color:var(--muted); line-height:1.5; }
  .node-xp {
    display:inline-block; margin-top:10px;
    background:rgba(0,212,255,.1); color:var(--accent);
    font-size:10px; font-family:'Space Mono',monospace; font-weight:700;
    padding:3px 8px; border-radius:20px;
  }
  .skill-node.completed .node-xp { background:rgba(16,185,129,.15); color:var(--green); }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    width:360px; flex-shrink:0; padding:28px 24px;
    overflow-y:auto; position:sticky; top:0; max-height:calc(100vh - 140px);
  }
  .detail-empty {
    height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px;
    color:var(--muted); text-align:center;
  }
  .detail-empty .de-icon { font-size:48px; opacity:.3; }
  .detail-empty p { font-size:13px; line-height:1.6; max-width:220px; }

  .detail-card { display:none; }
  .detail-card.visible { display:block; }

  .dc-header { margin-bottom:20px; }
  .dc-icon { font-size:36px; margin-bottom:10px; }
  .dc-title { font-size:20px; font-weight:800; margin-bottom:4px; }
  .dc-stage { font-size:11px; font-family:'Space Mono',monospace; color:var(--muted); }

  .dc-section { margin-bottom:20px; }
  .dc-section-label {
    font-size:10px; font-family:'Space Mono',monospace; font-weight:700;
    color:var(--muted); letter-spacing:.08em; text-transform:uppercase;
    margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--line);
  }
  .dc-section p { font-size:13px; line-height:1.7; color:#a0aec0; }

  .dc-exercise {
    background:var(--bg3); border:1px solid var(--line);
    border-radius:10px; padding:16px; margin-top:8px;
  }
  .dc-exercise .ex-label { font-size:10px; color:var(--accent); font-family:'Space Mono',monospace; font-weight:700; margin-bottom:8px; }
  .dc-exercise p { font-size:12px; color:#94a3b8; line-height:1.6; }

  .code-block {
    background:#060c18; border:1px solid var(--line); border-radius:8px;
    padding:14px; margin-top:10px; overflow-x:auto;
  }
  .code-block pre { font-family:'Space Mono',monospace; font-size:11px; color:#94a3b8; line-height:1.7; white-space:pre; }
  .code-block .kw { color:#7c3aed; } .code-block .fn { color:#00d4ff; }
  .code-block .st { color:#10b981; } .code-block .cm { color:#475569; }
  .code-block .nm { color:#f59e0b; }

  .dc-meta { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
  .meta-chip {
    padding:5px 12px; border-radius:20px; font-size:11px; font-family:'Space Mono',monospace;
    background:var(--bg3); border:1px solid var(--line);
  }
  .meta-chip.time { color:var(--gold); border-color:rgba(245,158,11,.3); }
  .meta-chip.xp   { color:var(--accent); border-color:rgba(0,212,255,.3); }
  .meta-chip.dep  { color:var(--accent2); border-color:rgba(124,58,237,.3); }

  .complete-btn {
    width:100%; padding:14px; border-radius:12px; border:none; cursor:pointer;
    font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
    transition: all .2s ease; margin-top:8px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color:#fff;
  }
  .complete-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,212,255,.25); }
  .complete-btn.done { background:var(--bg3); color:var(--green); border:1.5px solid var(--green); }
  .complete-btn.done:hover { transform:none; box-shadow:none; }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:28px; right:28px; z-index:100;
    background:var(--bg3); border:1px solid var(--green);
    padding:14px 20px; border-radius:12px;
    font-size:13px; font-weight:700; color:var(--green);
    transform:translateY(80px); opacity:0;
    transition: all .3s cubic-bezier(.4,0,.2,1);
    display:flex; align-items:center; gap:8px;
  }
  .toast.show { transform:translateY(0); opacity:1; }

  /* ── COMPLETION MODAL ── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.85);
    z-index:200; display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .modal-overlay.show { opacity:1; pointer-events:all; }
  .modal-box {
    background:var(--bg2); border:1px solid var(--accent);
    border-radius:20px; padding:40px; max-width:420px; width:90%;
    text-align:center; position:relative;
    box-shadow:0 0 60px rgba(0,212,255,.2);
  }
  .modal-emoji { font-size:56px; margin-bottom:16px; }
  .modal-title { font-size:24px; font-weight:800; margin-bottom:8px; }
  .modal-sub { font-size:14px; color:var(--muted); line-height:1.6; margin-bottom:24px; }
  .modal-close {
    padding:12px 32px; background:linear-gradient(135deg,var(--accent2),var(--accent));
    border:none; border-radius:10px; color:#fff; font-family:'Syne',sans-serif;
    font-size:14px; font-weight:700; cursor:pointer;
  }

  /* responsive */
  @media(max-width:900px) {
    .main { flex-direction:column; }
    .tree-panel { border-right:none; border-bottom:1px solid var(--line); }
    .detail-panel { width:100%; max-height:none; position:static; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
  <div class="logo">
    <div class="logo-icon">AI</div>
    <div>
      <div class="logo-text">AI-BOS Skill Tree</div>
      <div class="logo-sub">Engine 1 · Financial Intelligence</div>
    </div>
  </div>
  <div class="header-right">
    <div class="xp-bar-wrap">
      <div class="xp-label"><span id="xp-current">0</span> / <span id="xp-total">0</span> XP</div>
      <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    </div>
    <div class="level-badge" id="level-badge">LVL 0</div>
  </div>
</header>

<div class="progress-strip" id="progress-strip"></div>

<div class="main">
  <div class="tree-panel" id="tree-panel"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-empty" id="detail-empty">
      <div class="de-icon">🎯</div>
      <p>Click any skill node to see what it is, why you need it, and exactly how to learn it.</p>
    </div>
    <div class="detail-card" id="detail-card"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal"><div class="modal-box" id="modal-box"></div></div>

<script>
// ─── SKILL DATA ────────────────────────────────────────────────────────────────
const stages = [
  {
    id:'s1', name:'Python Core', color:'#00d4ff', time:'Weeks 1–2',
    desc:'The language itself. Everything else is built on this.',
    skills:[
      {
        id:'py-setup', name:'Install Python & VS Code', icon:'⚙️', xp:50,
        why:'You cannot write a single line of code without this. Takes 15 minutes.',
        time:'1 hour', deps:[],
        learn:'Install Python from python.org. Install VS Code from code.visualstudio.com. In VS Code, install the "Python" extension. Create a file called aibos.py.',
        exercise:'Type print("AI-BOS online") and run it. If you see that text appear — you are a programmer.',
        code:`<span class="cm"># Your first line of code</span>
<span class="fn">print</span>(<span class="st">"AI-BOS online"</span>)`,
        aiboswhy:'Every line of the Financial Engine runs in Python. This is the foundation of everything.'
      },
      {
        id:'py-vars', name:'Variables & Numbers', icon:'🔢', xp:80,
        why:'Variables store your financial data. Revenue, costs, profit — all variables.',
        time:'2 hours', deps:['py-setup'],
        learn:'A variable is a named box. You put a value in it and use it later. Python does maths the same way a calculator does.',
        exercise:'Create variables for a restaurant: monthly_revenue = 45000, monthly_costs = 28000. Calculate and print the profit.',
        code:`<span class="nm">monthly_revenue</span> = <span class="nm">45000</span>
<span class="nm">monthly_costs</span>   = <span class="nm">28000</span>
<span class="nm">profit</span> = <span class="nm">monthly_revenue</span> - <span class="nm">monthly_costs</span>
<span class="fn">print</span>(<span class="st">"Profit:"</span>, <span class="nm">profit</span>)`,
        aiboswhy:'The Financial Engine stores every number as a variable: revenue, each cost category, tax, payroll. This is step one.'
      },
      {
        id:'py-strings', name:'Strings & Print', icon:'📝', xp:60,
        why:'You need to display results in plain English to business owners, not just numbers.',
        time:'1.5 hours', deps:['py-vars'],
        learn:'A string is text in quotes. f-strings let you embed variables inside text cleanly.',
        exercise:'Print a formatted financial report line: "Mama\'s Kitchen made K17,000 profit this month."',
        code:`<span class="nm">name</span> = <span class="st">"Mama's Kitchen"</span>
<span class="nm">profit</span> = <span class="nm">17000</span>
<span class="fn">print</span>(<span class="st">f"</span><span class="nm">{name}</span><span class="st"> made K</span><span class="nm">{profit:,}</span><span class="st"> profit"</span>)`,
        aiboswhy:'Every AI insight card, every report, every alert is a string. The AI CFO speaks to owners in plain text.'
      },
      {
        id:'py-lists', name:'Lists', icon:'📋', xp:90,
        why:'12 months of revenue is a list. 500 transactions is a list. Every dataset is a list.',
        time:'2 hours', deps:['py-strings'],
        learn:'A list holds multiple values in order. You can loop through them, find the max, sum them all.',
        exercise:'Store 6 months of revenue in a list. Find the best month using max() and worst using min().',
        code:`<span class="nm">revenues</span> = [<span class="nm">42000</span>,<span class="nm">45000</span>,<span class="nm">38000</span>,<span class="nm">51000</span>,<span class="nm">49000</span>,<span class="nm">55000</span>]
<span class="fn">print</span>(<span class="st">"Best month:"</span>, <span class="fn">max</span>(<span class="nm">revenues</span>))
<span class="fn">print</span>(<span class="st">"Total:"</span>,      <span class="fn">sum</span>(<span class="nm">revenues</span>))
<span class="fn">print</span>(<span class="st">"Average:"</span>,    <span class="fn">sum</span>(<span class="nm">revenues</span>)/<span class="fn">len</span>(<span class="nm">revenues</span>))`,
        aiboswhy:'When a business uploads 12 months of data, it arrives as a list. Every calculation runs on that list.'
      },
      {
        id:'py-loops', name:'For Loops', icon:'🔄', xp:100,
        why:'Loops automate repetition. Instead of writing 500 lines, you write 5.',
        time:'2.5 hours', deps:['py-lists'],
        learn:'A for loop runs the same code on every item in a list automatically. This is how you scan entire datasets.',
        exercise:'Loop through 12 months of revenue and print an alert for any month below K40,000.',
        code:`<span class="nm">revenues</span> = [<span class="nm">42000</span>,<span class="nm">29000</span>,<span class="nm">51000</span>,<span class="nm">38000</span>]
<span class="kw">for</span> <span class="nm">i</span>, <span class="nm">rev</span> <span class="kw">in</span> <span class="fn">enumerate</span>(<span class="nm">revenues</span>):
    <span class="kw">if</span> <span class="nm">rev</span> < <span class="nm">40000</span>:
        <span class="fn">print</span>(<span class="st">f"⚠ Month </span><span class="nm">{i+1}</span><span class="st">: LOW revenue K</span><span class="nm">{rev:,}</span><span class="st">"</span>)`,
        aiboswhy:'The variance detection system loops through every financial metric checking for anomalies. This is the core of the alert engine.'
      },
      {
        id:'py-dicts', name:'Dictionaries', icon:'🗂️', xp:100,
        why:'A dictionary stores labelled data — like a row in a spreadsheet. Each cell has a name.',
        time:'2 hours', deps:['py-loops'],
        learn:'A dict stores key:value pairs. Instead of just 45000, you store {"revenue":45000,"costs":28000}.',
        exercise:'Create a dict for a business month. Add a calculated "profit" key to it. Print the whole summary.',
        code:`<span class="nm">month</span> = {
    <span class="st">"name"</span>:    <span class="st">"January"</span>,
    <span class="st">"revenue"</span>: <span class="nm">45000</span>,
    <span class="st">"costs"</span>:   <span class="nm">28000</span>
}
<span class="nm">month</span>[<span class="st">"profit"</span>] = <span class="nm">month</span>[<span class="st">"revenue"</span>] - <span class="nm">month</span>[<span class="st">"costs"</span>]
<span class="fn">print</span>(<span class="nm">month</span>)`,
        aiboswhy:'Every row of financial data is processed as a dictionary. The API sends data as dicts. Streamlit receives dicts.'
      },
      {
        id:'py-funcs', name:'Functions', icon:'⚡', xp:120,
        why:'Functions let you write a calculation once and reuse it for every business on the platform.',
        time:'3 hours', deps:['py-dicts'],
        learn:'def creates a function. You give it inputs, it returns outputs. Like a factory: raw data in, insight out.',
        exercise:'Write calculate_health_score(revenue, costs) that returns a score from 0–100 based on profit margin.',
        code:`<span class="kw">def</span> <span class="fn">calculate_profit</span>(<span class="nm">revenue</span>, <span class="nm">costs</span>):
    <span class="nm">profit</span> = <span class="nm">revenue</span> - <span class="nm">costs</span>
    <span class="nm">margin</span> = (<span class="nm">profit</span> / <span class="nm">revenue</span>) * <span class="nm">100</span>
    <span class="kw">return</span> <span class="nm">profit</span>, <span class="nm">round</span>(<span class="nm">margin</span>, <span class="nm">1</span>)

<span class="nm">p</span>, <span class="nm">m</span> = <span class="fn">calculate_profit</span>(<span class="nm">45000</span>, <span class="nm">28000</span>)
<span class="fn">print</span>(<span class="st">f"Profit: K{p:,} | Margin: {m}%"</span>)`,
        aiboswhy:'The entire Financial Engine is a collection of functions. calculate_cashflow(), detect_variance(), score_health(). You are writing those now.'
      },
      {
        id:'py-ifelse', name:'If / Else Logic', icon:'🧠', xp:80,
        why:'Conditional logic is how the engine makes decisions: "if margin is below 10%, send an alert."',
        time:'1.5 hours', deps:['py-funcs'],
        learn:'if checks a condition. elif checks another. else catches everything remaining. This is decision logic.',
        exercise:'Write a function that takes a profit margin and returns "CRITICAL", "WARNING", "HEALTHY", or "EXCELLENT".',
        code:`<span class="kw">def</span> <span class="fn">classify_health</span>(<span class="nm">margin</span>):
    <span class="kw">if</span>   <span class="nm">margin</span> < <span class="nm">5</span>:  <span class="kw">return</span> <span class="st">"🔴 CRITICAL"</span>
    <span class="kw">elif</span> <span class="nm">margin</span> < <span class="nm">15</span>: <span class="kw">return</span> <span class="st">"🟡 WARNING"</span>
    <span class="kw">elif</span> <span class="nm">margin</span> < <span class="nm">30</span>: <span class="kw">return</span> <span class="st">"🟢 HEALTHY"</span>
    <span class="kw">else</span>:              <span class="kw">return</span> <span class="st">"🚀 EXCELLENT"</span>`,
        aiboswhy:'Every alert, every recommendation trigger, every risk flag runs through if/else logic. This is the decision layer.'
      },
    ]
  },
  {
    id:'s2', name:'pandas & Data', color:'#7c3aed', time:'Weeks 3–4',
    desc:'Load real Excel/CSV files and run calculations on thousands of rows automatically.',
    skills:[
      {
        id:'pd-install', name:'pip & Installing Libraries', icon:'📦', xp:50,
        why:'pip is Python\'s package manager. You use it to add superpowers like pandas and Streamlit.',
        time:'30 min', deps:['py-ifelse'],
        learn:'Open your terminal (in VS Code: View → Terminal). Type: pip install pandas openpyxl plotly streamlit',
        exercise:'Run pip install pandas in the terminal. Then in Python: import pandas as pd — if no error, you\'re ready.',
        code:`<span class="cm"># In VS Code terminal (not in your .py file):</span>
pip install pandas openpyxl plotly streamlit

    <span class="cm"># Average of last 3 months as the trend</span>

    <span class="nm">alerts</span> = []
    <span class="kw">for</span> <span class="nm">i</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="nm">1</span>, <span class="fn">len</span>(<span class="nm">df</span>)):

        <span class="nm">change</span> = (<span class="nm">curr</span> - <span class="nm">prev</span>) / <span class="nm">prev</span>

// ─── STATE ──────────────────────────────────────────────────────────────────
let completed = new Set(JSON.parse(localStorage.getItem('aibos_completed') || '[]'));
let selectedSkill = null;

function saveState() {
  localStorage.setItem('aibos_completed', JSON.stringify([...completed]));
}

// ─── XP / LEVEL ─────────────────────────────────────────────────────────────
function getTotalXP() {
  let total = 0;
  stages.forEach(s => s.skills.forEach(sk => { if(completed.has(sk.id)) total += sk.xp; }));
  return total;
}
function getMaxXP() {
  let total = 0;
  stages.forEach(s => s.skills.forEach(sk => total += sk.xp));
  return total;
}
function getLevel(xp) {
  if (xp < 200)  return {n:1,  label:'Beginner'};
  if (xp < 500)  return {n:2,  label:'Learner'};
  if (xp < 900)  return {n:3,  label:'Builder'};
  if (xp < 1400) return {n:4,  label:'Developer'};
  if (xp < 2000) return {n:5,  label:'Engineer'};
  if (xp < 2600) return {n:6,  label:'AI Builder'};
  return              {n:7,  label:'Founder'};
}
function updateXPBar() {
  const xp = getTotalXP();
  const max = getMaxXP();
  const pct = max > 0 ? (xp/max)*100 : 0;
  document.getElementById('xp-current').textContent = xp;
  document.getElementById('xp-total').textContent = max;
  document.getElementById('xp-fill').style.width = pct + '%';
  const lvl = getLevel(xp);
  document.getElementById('level-badge').textContent = `LVL ${lvl.n} · ${lvl.label}`;
}

// ─── UNLOCK LOGIC ────────────────────────────────────────────────────────────
function isUnlocked(skill) {
  return skill.deps.every(d => completed.has(d));
}

// ─── STAGE PROGRESS STRIP ────────────────────────────────────────────────────
function renderProgressStrip() {
  const strip = document.getElementById('progress-strip');
  strip.innerHTML = '';
  stages.forEach(stage => {
    const done = stage.skills.filter(s => completed.has(s.id)).length;
    const total = stage.skills.length;
    const pct = total > 0 ? (done/total)*100 : 0;
    const div = document.createElement('div');
    div.className = `stage-pill ${stage.id}` + (pct===100 ? ' done' : '');
    div.style.setProperty('--sc', stage.color);
    div.innerHTML = `
      <div class="sp-num">Stage ${stages.indexOf(stage)+1}</div>
      <div class="sp-name">${stage.name}</div>
      <div class="sp-bar"><div class="sp-bar-fill" style="width:${pct}%"></div></div>
    `;
    strip.appendChild(div);
  });
}

// ─── TREE PANEL ──────────────────────────────────────────────────────────────
function renderTree() {
  const panel = document.getElementById('tree-panel');
  panel.innerHTML = '';
  stages.forEach(stage => {
    const done = stage.skills.filter(s => completed.has(s.id)).length;
    const sec = document.createElement('div');
    sec.className = `stage-section ${stage.id}`;
    sec.style.setProperty('--sc', stage.color);
    sec.innerHTML = `
      <div class="stage-header">
        <div class="stage-dot"></div>
        <div class="stage-title">${stage.name}</div>
        <div class="stage-time">${stage.time} &nbsp;·&nbsp; ${done}/${stage.skills.length} skills</div>
      </div>
      <div class="nodes-grid" id="grid-${stage.id}"></div>
    `;
    panel.appendChild(sec);

    const grid = sec.querySelector(`#grid-${stage.id}`);
    stage.skills.forEach(skill => {
      const unlocked = isUnlocked(skill);
      const done = completed.has(skill.id);
      const active = selectedSkill && selectedSkill.id === skill.id;
      const node = document.createElement('div');
      node.className = `skill-node ${done?'completed':''} ${!unlocked&&!done?'locked':''} ${active?'active-selected':''}`;
      node.style.setProperty('--sc', stage.color);
      node.innerHTML = `
        <div class="node-top">
          <div class="node-icon">${skill.icon}</div>
          <div class="node-status">${done?'✓':''}</div>
        </div>
        <div class="node-name">${skill.name}</div>
        <div class="node-why">${skill.why.substring(0,80)}${skill.why.length>80?'…':''}</div>
        <div class="node-xp">+${skill.xp} XP</div>
      `;
      if (unlocked || done) {
        node.addEventListener('click', () => selectSkill(skill, stage));
      }
      grid.appendChild(node);
    });
  });
}

// ─── DETAIL PANEL ────────────────────────────────────────────────────────────
function selectSkill(skill, stage) {
  selectedSkill = skill;
  renderTree();

  document.getElementById('detail-empty').style.display = 'none';
  const card = document.getElementById('detail-card');
  card.classList.add('visible');

  const done = completed.has(skill.id);

  card.innerHTML = `
    <div class="dc-header">
      <div class="dc-icon">${skill.icon}</div>
      <div class="dc-title">${skill.name}</div>
      <div class="dc-stage" style="color:${stage.color}">${stage.name} · ${stage.time}</div>
    </div>
    <div class="dc-meta">
      <span class="meta-chip time">⏱ ${skill.time}</span>
      <span class="meta-chip xp">+${skill.xp} XP</span>
      ${skill.deps.length>0?`<span class="meta-chip dep">Needs ${skill.deps.length} prior skill${skill.deps.length>1?'s':''}</span>`:''}
    </div>

    <div class="dc-section">
      <div class="dc-section-label">Why you need this</div>
      <p>${skill.why}</p>
    </div>

    <div class="dc-section">
      <div class="dc-section-label">How to learn it</div>
      <p>${skill.learn}</p>
    </div>

    <div class="dc-section">
      <div class="dc-section-label">Your exercise</div>
      <div class="dc-exercise">
        <div class="ex-label">▶ HANDS-ON TASK</div>
        <p>${skill.exercise}</p>
      </div>
    </div>

    <div class="dc-section">
      <div class="dc-section-label">Example code</div>
      <div class="code-block"><pre>${skill.code}</pre></div>
    </div>

    <div class="dc-section">
      <div class="dc-section-label">Why this matters for AI-BOS</div>
      <p>${skill.aiboswhy}</p>
    </div>

    <button class="complete-btn ${done?'done':''}" id="complete-btn" onclick="toggleComplete('${skill.id}', '${stage.id}')">
      ${done ? '✓ Completed — click to undo' : 'Mark as Complete  +'+skill.xp+' XP'}
    </button>
  `;
}

// ─── COMPLETE TOGGLE ─────────────────────────────────────────────────────────
function toggleComplete(skillId, stageId) {
  const stage = stages.find(s => s.id === stageId);
  const skill = stage.skills.find(s => s.id === skillId);

  if (completed.has(skillId)) {
    completed.delete(skillId);
    saveState();
    renderTree();
    renderProgressStrip();
    updateXPBar();
    selectSkill(skill, stage);
  } else {
    completed.add(skillId);
    saveState();
    renderTree();
    renderProgressStrip();
    updateXPBar();
    selectSkill(skill, stage);
    showToast(`+${skill.xp} XP — ${skill.name} complete!`);

    // Check stage completion
    const stageSkills = stage.skills.map(s => s.id);
    if (stageSkills.every(id => completed.has(id))) {
      setTimeout(() => showStageModal(stage), 600);
    }

    // Check full completion
    const allSkills = stages.flatMap(s => s.skills.map(sk => sk.id));
    if (allSkills.every(id => completed.has(id))) {
      setTimeout(() => showFinalModal(), 800);
    }
  }
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '⚡ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── MODALS ──────────────────────────────────────────────────────────────────
function showStageModal(stage) {
  const box = document.getElementById('modal-box');
  box.innerHTML = `
    <div class="modal-emoji">🏆</div>
    <div class="modal-title" style="color:${stage.color}">${stage.name} Complete!</div>
    <div class="modal-sub">You have mastered every skill in this stage. The next stage is now unlocked. Keep going — you are building something real.</div>
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('show')">Continue Building →</button>
  `;
  document.getElementById('modal').classList.add('show');
}
function showFinalModal() {
  const box = document.getElementById('modal-box');
  box.innerHTML = `
    <div class="modal-emoji">🚀</div>
    <div class="modal-title">Engine 1 Complete!</div>
    <div class="modal-sub">You have built the Financial Intelligence Engine from scratch. Python, pandas, Claude API, Streamlit, deployed with payments. This is a real product. AI-BOS Engine 1 is live.</div>
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('show')">Launch AI-BOS 🎉</button>
  `;
  document.getElementById('modal').classList.add('show');
}

// ─── STARS ────────────────────────────────────────────────────────────────────
function initStars() {
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  for (let i = 0; i < 120; i++) {
    const x = Math.random()*c.width, y = Math.random()*c.height;
    const r = Math.random()*1.2+0.2;
    const op = Math.random()*0.5+0.1;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${op})`; ctx.fill();
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
initStars();
renderProgressStrip();
renderTree();
updateXPBar();
</script>
